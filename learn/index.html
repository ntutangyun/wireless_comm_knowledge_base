<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Learn Wi-Fi — Wireless Knowledge Base</title>
<link rel="stylesheet" href="learn.css">
<script>
  // Apply persisted theme/lang before paint to avoid flash. Mirrors the main viewer.
  (function () {
    try {
      var t = localStorage.getItem("kb_theme") || "light";
      document.documentElement.setAttribute("data-theme", t);
      var p = new URLSearchParams(location.search);
      var l = p.get("lang") || localStorage.getItem("kb_lang") || "en";
      document.documentElement.setAttribute("lang", l === "zh" ? "zh" : "en");
    } catch (e) {}
  })();
</script>
<!-- Mermaid, same pattern as the main viewer -->
<script>
  window.__mermaidResolve = null;
  window.mermaidReady = new Promise(function (res) { window.__mermaidResolve = res; });
</script>
<script type="module">
  import("https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs")
    .then(function (mod) {
      const mermaid = mod.default;
      mermaid.initialize({ startOnLoad: false, securityLevel: "strict" });
      window.__mermaidResolve(mermaid);
    })
    .catch(function () { window.__mermaidResolve(null); });
</script>
</head>
<body>
<header class="lhead">
  <a class="back" href="../index.html" title="Back to Knowledge Base">&larr; <span data-i18n="back">KB</span></a>
  <h1 class="ltitle" data-i18n="title">Learn Wi-Fi</h1>
  <div class="lhead-actions">
    <button class="lbtn" id="lang-btn" aria-label="Language">EN / 中</button>
    <button class="lbtn" id="theme-btn" aria-label="Toggle theme">◑</button>
  </div>
</header>
<main id="app" class="lwrap"><p class="loading" data-i18n="loading">Loading…</p></main>
<script type="module" src="learn.js"></script>
</body>
</html>
