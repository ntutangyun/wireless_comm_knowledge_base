<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wireless Knowledge Base</title>
<style>
  /* ---------- THEME ---------- */
  :root {
    --fg: #18181b;
    --fg-2: #52525b;
    --fg-3: #a1a1aa;
    --bg: #ffffff;
    --bg-2: #fafafa;
    --bg-3: #f4f4f5;
    --border: #e4e4e7;
    --border-strong: #d4d4d8;
    --accent: #b40000;
    --accent-2: #fdf3f3;
    --accent-fg: #ffffff;
    --link: #0e6dc2;
    --code-bg: #f4f4f5;
    --col-academia: #6c5ce7;
    --col-academia-bg: #f3f1fc;
    --col-industry: #00946d;
    --col-industry-bg: #effbf6;
    --col-standards: #b48a00;
    --col-standards-bg: #fdf8e7;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 4px 12px rgba(0, 0, 0, 0.06);
    --shadow-strong: 0 8px 32px rgba(0, 0, 0, 0.12);
    --radius: 6px;
    --header-h: 52px;
    --side-w: 220px;
    --col-gap: 16px;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", "JetBrains Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  [data-theme="dark"] {
    --fg: #f4f4f5;
    --fg-2: #a1a1aa;
    --fg-3: #71717a;
    --bg: #0c0c0e;
    --bg-2: #18181b;
    --bg-3: #27272a;
    --border: #27272a;
    --border-strong: #3f3f46;
    --accent: #ef4444;
    --accent-2: #1f1313;
    --accent-fg: #ffffff;
    --link: #60a5fa;
    --code-bg: #18181b;
    --col-academia: #a78bfa;
    --col-academia-bg: #1c1830;
    --col-industry: #34d399;
    --col-industry-bg: #0e1f1a;
    --col-standards: #fbbf24;
    --col-standards-bg: #1f1a0a;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 4px 12px rgba(0, 0, 0, 0.5);
    --shadow-strong: 0 8px 32px rgba(0, 0, 0, 0.7);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    font-size: 13.5px; line-height: 1.55;
    color: var(--fg); background: var(--bg);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body.lang-zh { font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { font: inherit; }
  ::selection { background: var(--accent); color: var(--accent-fg); }

  /* ---------- HEADER ---------- */
  header.app-header {
    height: var(--header-h);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 30;
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; font-weight: 600; }
  .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); display: inline-block; transform: translateY(-1px); }
  .brand h1 { font-size: 14px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
  .brand .stats { color: var(--fg-3); font-size: 12px; font-variant-numeric: tabular-nums; }
  .header-spacer { flex: 1; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn, .lang-toggle {
    background: transparent; border: 1px solid var(--border); color: var(--fg-2);
    height: 30px; padding: 0 10px; border-radius: var(--radius); cursor: pointer; font-size: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: border-color 0.1s, color 0.1s;
  }
  .icon-btn:hover, .lang-toggle:hover { color: var(--fg); border-color: var(--border-strong); }
  .lang-toggle { padding: 0; overflow: hidden; }
  .lang-toggle button {
    background: transparent; border: 0; color: var(--fg-2); height: 28px; padding: 0 10px; cursor: pointer; font-size: 12px;
  }
  .lang-toggle button.active { background: var(--fg); color: var(--bg); }
  [data-theme="dark"] .lang-toggle button.active { background: var(--accent); color: var(--accent-fg); }

  /* ---------- TABS ---------- */
  nav.tabs {
    display: flex; gap: 0; padding: 0 20px;
    border-bottom: 1px solid var(--border); background: var(--bg);
    position: sticky; top: var(--header-h); z-index: 20;
  }
  nav.tabs button {
    background: transparent; border: 0; height: 38px; padding: 0 14px; cursor: pointer;
    color: var(--fg-2); font-size: 13px; border-bottom: 2px solid transparent;
    margin-bottom: -1px; white-space: nowrap;
  }
  nav.tabs button:hover { color: var(--fg); }
  nav.tabs button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  nav.tabs .kbd-hint { margin-left: auto; padding: 0 4px; font-size: 11px; color: var(--fg-3); display: flex; align-items: center; gap: 4px; }
  kbd { font-family: var(--mono); font-size: 10.5px; background: var(--bg-3); color: var(--fg-2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; line-height: 1.4; }

  /* ---------- LAYOUT ---------- */
  main {
    display: grid;
    grid-template-columns: var(--side-w) 1fr;
    gap: 20px;
    padding: 16px 20px 60px;
    max-width: 1700px; margin: 0 auto;
    align-items: start;
  }
  /* Sources tab and Topics-landing: hide the sidebar slot entirely so the
     section can use the full width. Without this, the topics grid renders
     inside a 1fr track that still has a 220px sibling column reserved for
     the (now-display:none) sidebar — which collapses cards to a single
     slim column once min-width: 280px kicks in. */
  body.tab-sources main,
  body.tab-taxonomy main,
  body.tab-topics-landing main {
    grid-template-columns: 1fr;
  }

  /* ---------- SIDEBAR ---------- */
  aside.sidebar {
    position: sticky; top: calc(var(--header-h) + 38px + 1px);
    max-height: calc(100vh - var(--header-h) - 38px - 1px);
    overflow-y: auto; padding: 4px 0; font-size: 13px;
  }
  .search-wrap { position: relative; }
  .search {
    width: 100%; padding: 7px 32px 7px 30px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font: inherit; background: var(--bg-2); color: var(--fg); outline: none;
  }
  .search:focus { border-color: var(--accent); background: var(--bg); }
  .search-icon { position: absolute; left: 8px; top: 8px; color: var(--fg-3); pointer-events: none; }
  .search-kbd { position: absolute; right: 8px; top: 6px; pointer-events: none; }

  .facet-group { margin-top: 18px; }
  .facet-group h3 {
    margin: 0 0 6px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--fg-3); cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 4px;
  }
  .facet-group h3 .chev { transition: transform 0.15s; opacity: 0.5; }
  .facet-group.collapsed h3 .chev { transform: rotate(-90deg); }
  .facet-group.collapsed .facet-list { display: none; }
  .facet-list { display: flex; flex-direction: column; gap: 1px; }
  .facet-item {
    display: flex; align-items: center; gap: 8px; padding: 3px 6px; cursor: pointer;
    border-radius: 4px; color: var(--fg-2); transition: background 0.1s, color 0.1s;
  }
  .facet-item:hover { background: var(--bg-3); color: var(--fg); }
  .facet-item input { margin: 0; accent-color: var(--accent); }
  .facet-item .label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .facet-item .count { color: var(--fg-3); font-size: 11px; font-variant-numeric: tabular-nums; }
  .facet-item.checked .label { color: var(--fg); font-weight: 500; }
  .facet-clear { margin-top: 8px; padding: 0; background: transparent; border: 0; color: var(--fg-3); font-size: 12px; cursor: pointer; }
  .facet-clear:hover { color: var(--accent); }

  /* ---------- 3-COLUMN TIMELINE ---------- */
  section.results { min-width: 0; }
  .result-bar {
    display: flex; align-items: center; gap: 12px;
    color: var(--fg-3); font-size: 12px; padding: 0 0 10px;
    font-variant-numeric: tabular-nums;
  }
  .result-bar .applied { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; min-width: 0; }
  .applied .chip {
    background: var(--accent-2); color: var(--accent);
    padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500;
    cursor: pointer; border: 1px solid transparent;
  }
  .applied .chip:hover { border-color: var(--accent); }
  .applied .chip::after { content: " ×"; opacity: 0.6; }
  .link-btn {
    background: transparent; border: 0; color: var(--fg-3);
    font: inherit; font-size: 11px; cursor: pointer; padding: 2px 6px;
    text-decoration: underline; text-underline-offset: 2px;
  }
  .link-btn:hover { color: var(--accent); }

  .columns {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: var(--col-gap);
    align-items: start;
  }
  .column {
    min-width: 0; display: flex; flex-direction: column;
  }
  .col-head {
    position: sticky;
    top: calc(var(--header-h) + 38px + 1px);
    background: var(--bg); z-index: 10;
    padding: 4px 0 10px;
    border-bottom: 2px solid;
    margin-bottom: 12px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .col-head .name { font-weight: 700; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }
  .col-head .count { font-size: 11px; color: var(--fg-3); font-variant-numeric: tabular-nums; }
  .column[data-cat="academia"]  .col-head { border-color: var(--col-academia); }
  .column[data-cat="academia"]  .col-head .name { color: var(--col-academia); }
  .column[data-cat="industry"]  .col-head { border-color: var(--col-industry); }
  .column[data-cat="industry"]  .col-head .name { color: var(--col-industry); }
  .column[data-cat="standards"] .col-head { border-color: var(--col-standards); }
  .column[data-cat="standards"] .col-head .name { color: var(--col-standards); }

  /* Per-column sparkline of entries-per-month */
  .col-density {
    display: flex; align-items: flex-end; gap: 1px;
    height: 36px; padding: 0 0 4px;
    margin-bottom: 8px;
  }
  .col-density .bar {
    flex: 1; min-width: 4px; background: var(--bg-3);
    border-radius: 1px 1px 0 0;
    cursor: pointer; position: relative;
    transition: background 0.1s;
  }
  .col-density .bar:hover { background: var(--fg-3); }
  .col-density .bar.has-current { background: var(--bg-3); }
  .col-density .bar[data-cat="academia"]  { background: var(--col-academia); opacity: 0.55; }
  .col-density .bar[data-cat="industry"]  { background: var(--col-industry); opacity: 0.55; }
  .col-density .bar[data-cat="standards"] { background: var(--col-standards); opacity: 0.55; }
  .col-density .bar:hover { opacity: 1; }
  .col-density .bar .tooltip {
    /* Tooltip appears BELOW the bar - the entries region has empty space
       there, while above the bars the col-head's category-name row would
       cover it. */
    display: none; position: absolute; top: calc(100% + 6px); left: 50%;
    transform: translateX(-50%); white-space: nowrap;
    background: var(--fg); color: var(--bg);
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    z-index: 20; pointer-events: none;
    font-variant-numeric: tabular-nums;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  .col-density .bar:hover .tooltip { display: block; }

  .month-divider {
    font-size: 11px; font-weight: 600; color: var(--fg-3);
    letter-spacing: 0.05em; text-transform: uppercase;
    margin: 12px 0 6px; padding: 4px 0;
    border-top: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: calc(var(--header-h) + 38px + 1px + 60px);  /* below col-head */
    z-index: 8;
  }
  .month-divider:first-child { border-top: 0; padding-top: 0; margin-top: 0; }

  /* ---------- ENTRY CARDS (compact) ---------- */
  .entry-card {
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg);
    cursor: pointer;
    margin-bottom: 8px;
    transition: border-color 0.1s, background 0.1s;
    position: relative;
    display: grid;
    grid-template-columns: 4px 1fr;   /* color stripe | content (carousel + text) */
    overflow: hidden;
  }
  .entry-card:hover { border-color: var(--border-strong); background: var(--bg-2); }
  .entry-card.focused { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-2); }
  .entry-card .stripe { background: var(--bg-3); }
  .entry-card[data-cat="academia"]  .stripe { background: var(--col-academia); }
  .entry-card[data-cat="industry"]  .stripe { background: var(--col-industry); }
  .entry-card[data-cat="standards"] .stripe { background: var(--col-standards); }
  .entry-card .content { min-width: 0; }
  .entry-card .text { padding: 10px 12px; }

  /* Image carousel above the text */
  .entry-card .carousel {
    position: relative;
    width: 100%; aspect-ratio: 16 / 7;
    background: var(--bg-3);
    overflow: hidden;
    border-bottom: 1px solid var(--border);
  }
  .entry-card .carousel-track {
    display: flex; height: 100%;
    transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    will-change: transform;
  }
  .entry-card .carousel-slide {
    flex: 0 0 100%; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-3);
  }
  .entry-card .carousel-slide img {
    max-width: 100%; max-height: 100%;
    width: auto; height: auto;
    object-fit: contain; display: block;
  }
  .entry-card .carousel-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 28px; height: 28px;
    background: rgba(0, 0, 0, 0.55); color: #fff;
    border: 0; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
    z-index: 2;
  }
  .entry-card:hover .carousel-btn { opacity: 1; }
  .entry-card .carousel-btn:hover { background: rgba(0, 0, 0, 0.75); }
  /* Touch devices: keep arrows visible since :hover never fires */
  @media (hover: none) {
    .entry-card .carousel-btn { opacity: 0.7; }
  }
  .entry-card .carousel-btn.prev { left: 6px; }
  .entry-card .carousel-btn.next { right: 6px; }
  .entry-card .carousel-btn svg { width: 14px; height: 14px; pointer-events: none; }
  .entry-card .carousel-dots {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; z-index: 2;
  }
  .entry-card .carousel-dots .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    cursor: pointer; padding: 0; border: 0;
    transition: background 0.1s;
  }
  .entry-card .carousel-dots .dot.active { background: rgba(255, 255, 255, 0.95); }
  .entry-card .carousel-dots .dot:hover { background: rgba(255, 255, 255, 0.85); }
  .entry-card.read .title { color: var(--fg-2); font-weight: 500; }
  .entry-card.unread .pub-date::before {
    content: "•"; color: var(--accent); margin-right: 4px;
    font-size: 14px; line-height: 0; vertical-align: middle;
  }
  .entry-card .top-row {
    display: flex; align-items: baseline; gap: 6px;
    margin-bottom: 3px;
  }
  .entry-card .pub-date {
    font-size: 11px; color: var(--fg-3); font-variant-numeric: tabular-nums;
    font-family: var(--mono);
    white-space: nowrap;
  }
  .entry-card .type-label {
    font-size: 10px; font-family: var(--mono);
    text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--fg-3);
  }
  .entry-card[data-cat="academia"]  .type-label { color: var(--col-academia); }
  .entry-card[data-cat="industry"]  .type-label { color: var(--col-industry); }
  .entry-card[data-cat="standards"] .type-label { color: var(--col-standards); }
  .entry-card .title {
    font-weight: 600; font-size: 13.5px; line-height: 1.4; color: var(--fg);
    margin: 0 0 4px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .entry-card .summary {
    font-size: 12px; line-height: 1.45; color: var(--fg-2);
    margin: 0 0 5px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .entry-card .meta { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; margin: 0; }
  .pill {
    display: inline-flex; align-items: center; height: 17px; padding: 0 6px; border-radius: 3px;
    font-size: 10.5px; font-family: var(--mono);
    background: var(--bg-3); color: var(--fg-2); border: 1px solid var(--border);
    line-height: 1; white-space: nowrap;
  }
  .pill.type {
    text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px; background: transparent;
  }
  .column[data-cat="academia"]  .pill.type { color: var(--col-academia); border-color: var(--col-academia); }
  .column[data-cat="industry"]  .pill.type { color: var(--col-industry); border-color: var(--col-industry); }
  .column[data-cat="standards"] .pill.type { color: var(--col-standards); border-color: var(--col-standards); }
  .pill.topic { background: var(--bg-3); }
  .pill.topic.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  .novelty { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: var(--fg-3); }
  .novelty-bar { display: inline-flex; gap: 2px; height: 7px; }
  .novelty-bar i { width: 5px; background: var(--bg-3); border-radius: 1px; display: inline-block; }
  .novelty-bar i.on { background: var(--accent); }

  .empty-col {
    text-align: center; padding: 40px 12px; color: var(--fg-3); font-size: 12px;
    border: 1px dashed var(--border); border-radius: var(--radius);
  }

  /* HTML `hidden` should always win even when something has display:grid/flex */
  [hidden] { display: none !important; }

  /* ---------- TECHNOLOGY NAV ---------- */
  :root {
    --col-wifi: #b40000;
    --col-cellular: #0066cc;
    --col-satellite: #7c3aed;
    --col-bluetooth: #0082fc;
    --col-uwb: #b8860b;
    --col-nearlink: #10b981;
  }
  [data-theme="dark"] {
    --col-wifi: #ef4444;
    --col-cellular: #60a5fa;
    --col-satellite: #a78bfa;
    --col-bluetooth: #38bdf8;
    --col-uwb: #fbbf24;
    --col-nearlink: #34d399;
  }
  nav.tech-nav {
    display: flex; gap: 6px; padding: 6px 20px;
    border-bottom: 1px solid var(--border); background: var(--bg);
    position: sticky; top: var(--header-h); z-index: 19;
    flex-wrap: wrap;
  }
  nav.tech-nav button {
    background: transparent; border: 1px solid var(--border); color: var(--fg-2);
    height: 28px; padding: 0 12px; border-radius: 999px; cursor: pointer;
    font-size: 12px; white-space: nowrap;
    transition: border-color 0.1s, background 0.1s, color 0.1s;
  }
  nav.tech-nav button:hover { border-color: var(--border-strong); color: var(--fg); }
  nav.tech-nav button.active[data-tech="wifi"]      { background: var(--col-wifi);      color: #fff; border-color: var(--col-wifi); }
  nav.tech-nav button.active[data-tech="cellular"]  { background: var(--col-cellular);  color: #fff; border-color: var(--col-cellular); }
  nav.tech-nav button.active[data-tech="satellite"] { background: var(--col-satellite); color: #fff; border-color: var(--col-satellite); }
  nav.tech-nav button.active[data-tech="bluetooth"] { background: var(--col-bluetooth); color: #fff; border-color: var(--col-bluetooth); }
  nav.tech-nav button.active[data-tech="uwb"]       { background: var(--col-uwb);       color: #fff; border-color: var(--col-uwb); }
  nav.tech-nav button.active[data-tech="nearlink"]  { background: var(--col-nearlink);  color: #fff; border-color: var(--col-nearlink); }
  .entry-card .tech-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--bg-3); vertical-align: middle; margin-right: 3px;
    flex-shrink: 0;
  }
  .entry-card[data-tech="wifi"]      .tech-dot { background: var(--col-wifi); }
  .entry-card[data-tech="cellular"]  .tech-dot { background: var(--col-cellular); }
  .entry-card[data-tech="satellite"] .tech-dot { background: var(--col-satellite); }
  .entry-card[data-tech="bluetooth"] .tech-dot { background: var(--col-bluetooth); }
  .entry-card[data-tech="uwb"]       .tech-dot { background: var(--col-uwb); }
  .entry-card[data-tech="nearlink"]  .tech-dot { background: var(--col-nearlink); }
  .topics-page .tech-section { margin: 0 0 24px; }
  .topics-page .tech-head {
    font-size: 15px; font-weight: 700;
    padding: 6px 0 10px; margin-bottom: 12px;
    border-bottom: 2px solid var(--border);
    display: flex; align-items: baseline; gap: 8px;
  }
  .topics-page .tech-head .tech-count { font-size: 11px; font-weight: 500; color: var(--fg-3); }
  .topics-page .tech-head[data-tech="wifi"]      { border-color: var(--col-wifi); color: var(--col-wifi); }
  .topics-page .tech-head[data-tech="cellular"]  { border-color: var(--col-cellular); color: var(--col-cellular); }
  .topics-page .tech-head[data-tech="satellite"] { border-color: var(--col-satellite); color: var(--col-satellite); }
  .topics-page .tech-head[data-tech="bluetooth"] { border-color: var(--col-bluetooth); color: var(--col-bluetooth); }
  .topics-page .tech-head[data-tech="uwb"]       { border-color: var(--col-uwb); color: var(--col-uwb); }
  .topics-page .tech-head[data-tech="nearlink"]  { border-color: var(--col-nearlink); color: var(--col-nearlink); }
  @media (max-width: 640px) {
    nav.tech-nav { padding: 6px 12px; gap: 4px; }
    nav.tech-nav button { font-size: 11px; padding: 0 10px; height: 26px; }
  }

  /* ---------- SOURCES PAGE ---------- */
  .sources-page { padding: 0; width: 100%; }
  .sources-page .intro {
    color: var(--fg-2); font-size: 13px; line-height: 1.55;
    margin: 0 0 18px; padding: 12px 14px;
    background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius);
  }
  .sources-page .intro code {
    font-family: var(--mono); font-size: 12px;
    background: var(--bg-3); padding: 1px 5px; border-radius: 3px;
  }
  .sources-page .src-cat {
    margin: 0 0 22px;
  }
  .sources-page .src-cat-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 10px;
  }
  .sources-page .src-cat-head {
    font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase;
    padding-bottom: 6px; border-bottom: 2px solid; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .sources-page .src-cat-head .count { font-size: 11px; color: var(--fg-3); font-weight: 500; letter-spacing: 0; text-transform: none; }
  .sources-page .src-cat[data-cat="academia"]  .src-cat-head { border-color: var(--col-academia); color: var(--col-academia); }
  .sources-page .src-cat[data-cat="industry"]  .src-cat-head { border-color: var(--col-industry); color: var(--col-industry); }
  .sources-page .src-cat[data-cat="standards"] .src-cat-head { border-color: var(--col-standards); color: var(--col-standards); }
  .sources-page .src-card {
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 14px;
    background: var(--bg);
    display: grid; grid-template-columns: 1fr auto;
    gap: 8px; align-items: start;
    min-width: 0;
  }
  .sources-page .src-card:hover { border-color: var(--border-strong); background: var(--bg-2); }
  .sources-page .src-card .name {
    font-weight: 600; font-size: 13.5px; color: var(--fg);
    margin: 0 0 3px;
  }
  .sources-page .src-card .name a { color: var(--fg); text-decoration: none; }
  .sources-page .src-card .name a:hover { color: var(--accent); text-decoration: underline; }
  .sources-page .src-card .meta {
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    font-size: 11px;
    margin: 4px 0 6px;
  }
  .sources-page .src-card .meta .pill {
    height: 18px; line-height: 1;
  }
  .sources-page .src-card .pill.kind     { background: var(--bg-3); }
  .sources-page .src-card .notes {
    color: var(--fg-2); font-size: 12px; line-height: 1.5;
    margin: 0;
  }
  .sources-page .src-card .query {
    font-family: var(--mono); font-size: 11.5px;
    color: var(--fg-2); background: var(--code-bg);
    padding: 2px 6px; border-radius: 3px;
    margin-top: 4px; display: inline-block;
    word-break: break-word;
  }
  .sources-page .src-card .open {
    align-self: start;
    font-size: 11px; color: var(--accent);
    text-decoration: none; white-space: nowrap;
    padding: 4px 8px; border: 1px solid var(--accent); border-radius: var(--radius);
  }
  .sources-page .src-card .open:hover { background: var(--accent); color: var(--accent-fg); }
  .sources-page .src-card .topic-hint {
    font-size: 10.5px; font-family: var(--mono);
    background: var(--bg-3); color: var(--fg-2);
    padding: 1px 5px; border-radius: 3px;
  }
  .empty-state { text-align: center; padding: 80px 20px; color: var(--fg-3); font-size: 14px; }
  .empty-state code { background: var(--bg-3); padding: 2px 6px; border-radius: 3px; font-family: var(--mono); font-size: 12px; }

  /* ---------- DRAWER (unchanged) ---------- */
  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0); pointer-events: none;
    transition: background 0.2s ease; z-index: 40;
  }
  .drawer-overlay.open { background: rgba(0, 0, 0, 0.18); pointer-events: auto; }
  [data-theme="dark"] .drawer-overlay.open { background: rgba(0, 0, 0, 0.55); }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(720px, 100%);
    background: var(--bg); border-left: 1px solid var(--border); box-shadow: var(--shadow-strong);
    transform: translateX(100%); transition: transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
    z-index: 50; display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    height: var(--header-h); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; padding: 0 12px 0 16px; background: var(--bg); flex-shrink: 0;
  }
  .drawer-head .pos { color: var(--fg-3); font-size: 12px; font-variant-numeric: tabular-nums; margin-right: auto; }
  .drawer-body { overflow-y: auto; padding: 28px 36px 80px; scroll-behavior: smooth; }
  .drawer-body h2.entry-title { margin: 0 0 8px; font-size: 22px; font-weight: 700; line-height: 1.25; letter-spacing: -0.01em; color: var(--fg); }
  .drawer-body .meta-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 0 0 24px; font-size: 12px; }
  .drawer-body .meta-row .date { color: var(--fg-2); font-variant-numeric: tabular-nums; }
  .drawer-body .body-html { font-size: 14.5px; line-height: 1.65; color: var(--fg); max-width: 720px; }
  .drawer-body .body-html h3 {
    margin: 28px 0 10px; font-size: 14px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em; color: var(--fg-2);
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .drawer-body .body-html h3:first-child { margin-top: 0; }
  .drawer-body .body-html h4 { margin: 20px 0 8px; font-size: 14px; font-weight: 600; }
  .drawer-body .body-html p { margin: 0 0 14px; }
  .drawer-body .body-html ul { margin: 0 0 14px; padding-left: 22px; }
  .drawer-body .body-html li { margin-bottom: 4px; }
  .drawer-body .body-html code { font-family: var(--mono); font-size: 0.86em; background: var(--code-bg); padding: 1px 5px; border-radius: 3px; color: var(--fg); }
  .drawer-body .body-html strong { color: var(--fg); font-weight: 600; }
  .drawer-body .body-html em { color: var(--fg); }
  .drawer-body .images-block { margin: 28px 0; display: flex; flex-direction: column; gap: 18px; }
  .drawer-body .images-block figure {
    margin: 0; border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; background: var(--bg-2);
  }
  .drawer-body .images-block img { display: block; width: 100%; height: auto; background: var(--bg-2); }
  .drawer-body .images-block figcaption {
    padding: 10px 14px; font-size: 12.5px; color: var(--fg-2); border-top: 1px solid var(--border);
  }
  .drawer-foot {
    border-top: 1px solid var(--border); background: var(--bg);
    padding: 12px 24px; display: flex; gap: 12px; flex-shrink: 0; font-size: 13px;
    flex-wrap: wrap;
  }
  .drawer-foot .btn {
    background: var(--bg-2); border: 1px solid var(--border); color: var(--fg-2);
    padding: 7px 14px; border-radius: var(--radius); cursor: pointer; text-decoration: none;
    transition: border-color 0.1s, color 0.1s;
  }
  .drawer-foot .btn:hover { color: var(--fg); border-color: var(--border-strong); text-decoration: none; }
  .drawer-foot .btn.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  .drawer-foot .btn.primary:hover { color: var(--accent-fg); }
  .drawer-foot .spacer { flex: 1; }

  .help-modal { position: fixed; inset: 0; z-index: 60; background: rgba(0, 0, 0, 0.4); display: none; align-items: center; justify-content: center; }
  .help-modal.open { display: flex; }
  .help-modal .panel {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 24px 28px;
    max-width: 460px; width: calc(100% - 32px); box-shadow: var(--shadow-strong);
  }
  .help-modal h2 { margin: 0 0 16px; font-size: 16px; }
  .help-modal table { border-collapse: collapse; width: 100%; }
  .help-modal td { padding: 5px 0; font-size: 13px; }
  .help-modal td:first-child { width: 110px; }

  /* Mobile-only "Filters" toggle button — visible <=640px */
  .filters-toggle { display: none; }
  .filters-toggle.is-active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 1100px) {
    main { grid-template-columns: 1fr; }
    aside.sidebar { position: static; max-height: none; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  }
  @media (max-width: 820px) {
    .columns { grid-template-columns: 1fr; }
    .col-head { position: static; }
    .drawer { width: 100%; }
    .drawer-body { padding: 20px 18px 80px; }
    nav.tabs .kbd-hint { display: none; }
  }

  /* ---------- PHONE (<= 640px) ---------- */
  @media (max-width: 640px) {
    :root { --header-h: 56px; }
    body { font-size: 14px; }
    /* Header: tighter padding, drop stats text, drop GitHub + help icons */
    header.app-header { padding: 0 12px; gap: 6px; }
    .brand { min-width: 0; gap: 6px; }
    .brand h1 { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand .stats { display: none; }
    #help-btn, .header-actions a.icon-btn[href*="github.com"] { display: none; }
    /* Very narrow phones: tighten button widths */
    @media (max-width: 360px) {
      .icon-btn, .lang-toggle { min-width: 32px; padding: 0 8px; }
      .lang-toggle button { padding: 0 8px; }
    }
    /* Touch-target sizing for header buttons */
    .icon-btn, .lang-toggle { height: 36px; min-width: 36px; padding: 0 10px; }
    .lang-toggle button { height: 34px; padding: 0 12px; font-size: 13px; }
    /* Tabs: scroll horizontally if the labels overflow */
    nav.tabs { padding: 0 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    nav.tabs::-webkit-scrollbar { display: none; }
    nav.tabs button { font-size: 13px; padding: 0 12px; height: 42px; flex-shrink: 0; }
    /* Main grid: trim outer padding */
    main { padding: 12px 12px 60px; gap: 12px; }
    /* Filters toggle becomes visible; sidebar hides until toggled */
    .filters-toggle { display: inline-flex; }
    aside.sidebar { display: none; padding: 12px 0 16px; margin-bottom: 0; }
    body.show-filters aside.sidebar { display: block; }
    /* Larger tap targets for facet checkboxes + clear */
    .facet-item { padding: 8px 6px; }
    .facet-item input { width: 16px; height: 16px; }
    .facet-clear { padding: 8px 0; }
    /* Search input: a touch larger to match the new header height */
    .search { padding: 9px 32px 9px 30px; font-size: 14px; }
    /* Result-bar: chips can wrap */
    .result-bar { flex-wrap: wrap; }
    /* Card text: a hair larger for readability */
    .entry-card .title { font-size: 14px; }
    .entry-card .summary { font-size: 12.5px; }
    .entry-card .carousel { aspect-ratio: 16 / 9; }
    /* Drawer: tighter padding, full-bleed; foot wraps */
    .drawer-body { padding: 18px 14px 90px; }
    .drawer-body h2.entry-title { font-size: 19px; }
    .drawer-body .body-html { font-size: 14.5px; }
    .drawer-foot { padding: 10px 12px; gap: 8px; }
    .drawer-foot .btn { padding: 9px 12px; font-size: 13px; flex: 0 0 auto; }
    /* Help modal sized down */
    .help-modal .panel { padding: 18px 16px; }
    /* Sources page: single-column at narrow widths */
    .sources-page .src-cat-cards { grid-template-columns: 1fr; }
  }

  /* ---------- TOPICS LANDING PAGE ---------- */
  .topics-page {
    padding: 4px 0 24px;
  }
  .topics-page .stack-block {
    margin: 0 0 24px;
  }
  .topics-page .stack-head {
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--fg-2);
    padding: 6px 0 10px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 8px;
  }
  .topics-page .stack-head .count {
    font-size: 11px; color: var(--fg-3); font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .topics-page .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .topic-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.1s, background 0.1s, transform 0.1s;
    display: flex; flex-direction: column;
    min-height: 140px;
  }
  .topic-card:hover {
    border-color: var(--border-strong); background: var(--bg-2);
    transform: translateY(-1px);
  }
  .topic-card .topic-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 8px; margin-bottom: 6px;
  }
  .topic-card .topic-label {
    font-size: 14px; font-weight: 700; color: var(--fg);
    line-height: 1.3;
  }
  .topic-card .topic-counts {
    display: flex; gap: 4px; flex-shrink: 0;
    font-size: 10px; font-family: var(--mono);
    font-variant-numeric: tabular-nums;
  }
  .topic-card .topic-counts .pri {
    background: var(--accent-2); color: var(--accent);
    padding: 1px 6px; border-radius: 3px; font-weight: 700;
  }
  .topic-card .topic-counts .sec {
    background: var(--bg-3); color: var(--fg-3);
    padding: 1px 6px; border-radius: 3px;
  }
  .topic-card .topic-desc {
    font-size: 12.5px; color: var(--fg-2); line-height: 1.5;
    margin: 0 0 10px;
    flex: 1;
  }
  .topic-card .topic-mix {
    display: flex; gap: 6px; flex-wrap: wrap;
    font-size: 10px; font-family: var(--mono);
    color: var(--fg-3);
  }
  .topic-card .topic-mix .mix-pill {
    background: var(--bg-3);
    padding: 1px 6px; border-radius: 3px;
    font-variant-numeric: tabular-nums;
  }
  .topic-card .topic-mix .mix-pill[data-cat="academia"] {
    background: var(--col-academia-bg); color: var(--col-academia);
  }
  .topic-card .topic-mix .mix-pill[data-cat="industry"] {
    background: var(--col-industry-bg); color: var(--col-industry);
  }
  .topic-card .topic-mix .mix-pill[data-cat="standards"] {
    background: var(--col-standards-bg); color: var(--col-standards);
  }
  .topic-card.empty {
    border-style: dashed; opacity: 0.7;
  }
  .topic-card.empty .topic-label { color: var(--fg-2); }
  .topic-card.empty .topic-counts .pri,
  .topic-card.empty .topic-counts .sec {
    background: var(--bg-3); color: var(--fg-3);
  }

  /* Topic-detail breadcrumb (shown above the 3-column layout
     when a specific topic is open). */
  .topic-breadcrumb {
    padding: 6px 0 14px;
    margin: -4px 0 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .topic-breadcrumb .crumb-row {
    display: flex; align-items: baseline; gap: 8px;
  }
  .topic-breadcrumb .back-btn {
    background: transparent; border: 0; padding: 0;
    cursor: pointer; color: var(--link);
    font-size: 13px; font-family: inherit;
  }
  .topic-breadcrumb .back-btn:hover { text-decoration: underline; }
  .topic-breadcrumb .sep { color: var(--fg-3); }
  .topic-breadcrumb .topic-name {
    font-weight: 700; color: var(--fg); font-size: 15px;
  }
  .topic-breadcrumb .topic-detail-desc {
    font-size: 12.5px; color: var(--fg-2);
    font-weight: 400; line-height: 1.5;
    margin: 4px 0 0;
  }
  /* Per-topic living narrative (Phase 4). 2-3 paragraphs of current
     state — refreshed by the scout when new entries land in the bin. */
  .topic-narrative {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin: 10px 0 0;
    font-size: 13px; line-height: 1.55;
    color: var(--fg);
  }
  .topic-narrative p { margin: 0 0 8px; }
  .topic-narrative p:last-child { margin: 0; }
  .topic-narrative code {
    background: var(--bg-3); color: var(--fg-2);
    font-family: var(--mono); font-size: 11.5px;
    padding: 1px 4px; border-radius: 3px;
  }
  .topic-narrative .narrative-meta {
    font-size: 11px; color: var(--fg-3);
    text-transform: uppercase; letter-spacing: 0.04em;
    margin-bottom: 8px; font-family: var(--mono);
  }
  .topic-narrative.empty {
    background: transparent; border-style: dashed;
    color: var(--fg-3); font-style: italic;
    text-align: center; padding: 14px 16px;
  }
  /* Per-topic Mermaid mindmap (Phase 5). Lives below the narrative; one
     glance overview of the bin's structure. Source is topics/<id>.diagram.mmd
     in the public repo, rendered client-side via mermaid.js from CDN. */
  .topic-diagram {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px 8px;
    margin: 10px 0 0;
    overflow-x: auto;
  }
  .topic-diagram-header {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--fg-3);
    text-transform: uppercase; letter-spacing: 0.04em;
    margin-bottom: 6px; font-family: var(--mono);
  }
  .topic-diagram-toggle {
    background: transparent; border: 1px solid var(--border);
    color: var(--fg-2); font: inherit; cursor: pointer;
    padding: 1px 8px; border-radius: 3px;
  }
  .topic-diagram-body { min-height: 0; }
  .topic-diagram.collapsed .topic-diagram-body { display: none; }
  .topic-diagram svg { max-width: 100%; height: auto; }

  /* ---------- TAXONOMY PAGE ---------- */
  .taxonomy-page { padding: 4px 0 24px; }
  .taxonomy-page .intro {
    color: var(--fg-2); font-size: 13px; line-height: 1.55;
    margin: 0 0 20px; padding: 12px 14px;
    background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius);
    max-width: 900px;
  }
  .taxonomy-search-wrap {
    position: relative; max-width: 420px; margin: 0 0 22px;
  }
  .taxonomy-search-wrap input {
    width: 100%; padding: 8px 34px 8px 32px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font: inherit; background: var(--bg-2); color: var(--fg); outline: none;
  }
  .taxonomy-search-wrap input:focus { border-color: var(--accent); background: var(--bg); }
  .taxonomy-search-wrap .search-icon { position: absolute; left: 9px; top: 9px; color: var(--fg-3); pointer-events: none; }
  .taxonomy-search-wrap .search-clear {
    position: absolute; right: 4px; top: 4px; background: transparent; border: 0;
    color: var(--fg-3); cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 3px;
  }
  .taxonomy-search-wrap .search-clear:hover { color: var(--fg); }
  .taxonomy-cat {
    margin: 0 0 28px;
    scroll-margin-top: calc(var(--header-h) + 38px + 16px);
  }
  .taxonomy-cat-head {
    font-size: 15px; font-weight: 700; color: var(--fg);
    padding: 0 0 8px; margin: 0 0 14px;
    border-bottom: 2px solid var(--border);
    display: flex; align-items: baseline; gap: 8px;
  }
  .taxonomy-cat-head .count { font-size: 12px; color: var(--fg-3); font-weight: 500; }
  .taxonomy-cat-desc {
    font-size: 13px; color: var(--fg-2); line-height: 1.55;
    margin: 0 0 16px; max-width: 800px;
  }
  .taxonomy-term {
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); padding: 14px 18px;
    margin: 0 0 10px;
    scroll-margin-top: calc(var(--header-h) + 38px + 8px);
    transition: border-color 0.1s, background 0.1s;
  }
  .taxonomy-term:hover { border-color: var(--border-strong); background: var(--bg-2); }
  .taxonomy-term .term-head {
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
    margin: 0 0 8px;
  }
  .taxonomy-term .term-name {
    font-weight: 700; font-size: 14px; color: var(--accent);
    font-family: var(--mono);
  }
  .taxonomy-term .term-aliases {
    font-size: 11px; color: var(--fg-3); font-family: var(--mono);
  }
  .taxonomy-term .term-def {
    font-size: 13px; line-height: 1.6; color: var(--fg-2);
    margin: 0 0 6px;
  }
  .taxonomy-term .term-def:last-child { margin-bottom: 0; }
  .taxonomy-term .term-lang-tag {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--fg-3);
    margin-bottom: 2px;
  }
  .taxonomy-no-results {
    text-align: center; padding: 40px 20px; color: var(--fg-3); font-size: 14px;
  }
  /* Side-nav for jumping between taxonomy categories */
  .taxonomy-nav {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin: 0 0 18px; padding: 0;
  }
  .taxonomy-nav a {

<!-- Mermaid for per-topic mindmap rendering. Two scripts:
       1. A synchronous regular script defines window.mermaidReady as a
          Promise *before* the viewer's main render code runs. The viewer
          awaits this Promise, so it always sees a Promise (never undefined).
       2. A deferred module script imports mermaid from the CDN and resolves
          the Promise once initialized. Without (1), the viewer's render code
          runs during HTML parsing, when (2) has not yet executed —
          window.mermaidReady would be undefined and the SVG never appears. -->
<script>
  window.__mermaidResolve = null;
  window.mermaidReady = new Promise(res => { window.__mermaidResolve = res; });
</script>
<script type="module">
  import("https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs")
    .then(mod => {
      const mermaid = mod.default;
      mermaid.initialize({ startOnLoad: false, securityLevel: "loose", theme: "neutral" });
      window.mermaid = mermaid;
      window.__mermaidResolve(mermaid);
    })
    .catch(err => {
      // Leave the Promise pending — the viewer's catch handler will swallow
      // the never-resolves case and the diagram falls back to raw source.
      console.warn("mermaid load failed:", err);
    });
</script>

  standards: ["802.11a","802.11b","802.11g","802.11n","802.11ac","802.11ax","802.11be","802.11bn","802.11bf","802.11bq","802.11ba","802.11az"],

  market: ["IoT","XR","products","automotive","industrial"],
};
function topicGroup(t) {
  for (const [g, list] of Object.entries(TOPIC_GROUPS)) if (list.includes(t)) return g;
  return "other";
}

const CATEGORIES = ["academia", "industry", "standards"];

let state = {
  data: null,
  entries: [],
  topicCounts: {},
  topicsVocab: { stacks: [], topics: [] },     // from topics.json (via kb.json)
  topicsAggregate: {},                          // per-topic entry-id lists
  filtered: [],
  filters: {
    // Default landing view is the topic-binned grid. When a user clicks a
    // topic card, tab stays "topics" but topicPrimary is set to that id; the
    // 3-column layout then shows only entries belonging to that topic.
    tab: "topics", search: "",
    topics: new Set(),         // legacy topic-tag filter (retained for "All" view)
    topicPrimary: "",          // empty = topic landing grid; set = topic detail
    technology: "all",         // "all" or a specific technology id
  },
  lang: localStorage.getItem("kb_lang") || "en",
  theme: localStorage.getItem("kb_theme") || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"),
  readSet: new Set(JSON.parse(localStorage.getItem("kb_read") || "[]")),
  drawerIdx: -1,
  focusIdx: -1,
};

function markRead(entryId) {
  if (!entryId) return;
  state.readSet.add(entryId);
  localStorage.setItem("kb_read", JSON.stringify([...state.readSet]));
}
function markAllRead() {
  state.entries.forEach(e => state.readSet.add(e.id));
  localStorage.setItem("kb_read", JSON.stringify([...state.readSet]));
  render();
}
function clearRead() {
  state.readSet.clear();
  localStorage.removeItem("kb_read");
  render();
}

function t() { return I18N[state.lang]; }

function readUrlState() {
  const h = location.hash.replace(/^#/, "");
  if (!h) return;
  const params = new URLSearchParams(h);
  if (params.has("tab")) state.filters.tab = params.get("tab");
  if (params.has("topic")) state.filters.topicPrimary = params.get("topic");
  if (params.has("tech")) state.filters.technology = params.get("tech");
  if (params.has("q")) state.filters.search = params.get("q");
  if (params.has("topics")) state.filters.topics = new Set(params.get("topics").split(",").filter(Boolean));
  if (params.has("lang")) state.lang = params.get("lang");
  if (params.has("entry")) state._pendingEntry = params.get("entry");
}
function writeUrlState() {
  const p = new URLSearchParams();
  // Default tab is "topics" — only set explicitly if it differs.
  if (state.filters.tab !== "topics") p.set("tab", state.filters.tab);
  if (state.filters.topicPrimary) p.set("topic", state.filters.topicPrimary);
  if (state.filters.technology !== "all") p.set("tech", state.filters.technology);
  if (state.filters.search) p.set("q", state.filters.search);
  if (state.filters.topics.size) p.set("topics", [...state.filters.topics].join(","));
  if (state.lang !== "en") p.set("lang", state.lang);
  if (state.drawerIdx >= 0 && state.filtered[state.drawerIdx]) p.set("entry", state.filtered[state.drawerIdx].id);
  const hash = p.toString();
  history.replaceState(null, "", hash ? "#" + hash : location.pathname);
}

function applyLang() {
  document.documentElement.lang = state.lang === "zh" ? "zh" : "en";

  document.getElementById("header-title").textContent = labels.title;
  document.getElementById("search").placeholder = labels.search_placeholder;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const k = el.getAttribute("data-i18n");
    if (labels[k]) el.textContent = labels[k];
  });
  const tabBtns = document.querySelectorAll("nav.tabs button");
  tabBtns[0].textContent = labels.tab_topics;
  tabBtns[1].textContent = labels.tab_all;
  tabBtns[2].textContent = labels.tab_recent;
  tabBtns[3].textContent = labels.tab_recent30;
  tabBtns[4].textContent = labels.tab_recent365;
  if (tabBtns[5]) tabBtns[5].textContent = labels.tab_sources;
  if (tabBtns[6]) tabBtns[6].textContent = labels.tab_taxonomy;
  document.querySelectorAll("nav.tech-nav button").forEach(b => {
    b.textContent = labels["tech_" + b.dataset.tech] || b.dataset.tech;
  });
  document.querySelectorAll("#lang-toggle button").forEach(b => b.classList.toggle("active", b.dataset.lang === state.lang));
  document.getElementById("facet-clear").textContent = labels.facet_clear;
  document.getElementById("drawer-original").textContent = labels.open_original;
  document.getElementById("drawer-source").textContent = labels.open_source;
  document.getElementById("drawer-copy").textContent = labels.copy_citation;

  ht.innerHTML = SHORTCUTS.map(([k, en, zh]) =>

}

function applyTheme() {

    : '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/>';

async function load() {
  applyTheme();
  readUrlState();
  applyLang();
  try {
    let data;
    if (window.KB_DATA && Array.isArray(window.KB_DATA.entries)) data = window.KB_DATA;
    else {
      const r = await fetch("kb.json", { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      data = await r.json();
    }
    state.data = data;
    state.entries = data.entries || [];
    state.topicCounts = data.topic_counts || {};
    state.topicsVocab = data.topics_vocab || { stacks: [], topics: [] };
    state.topicsAggregate = data.topics_aggregate || {};
    document.getElementById("stats").textContent =
      `${state.entries.length} ${t().entries_label} · ${t().last_updated} ${data.last_updated || "—"}`;
    renderFacets();
    render();
    if (state._pendingEntry) {
      // If we're on the topics-landing view, the entry won't be in
      // state.filtered (the landing renderer never populates it). Switch to
      // "all" so the deep-link drawer flow works.
      if (state.filters.tab === "topics" && !state.filters.topicPrimary) {
        state.filters.tab = "all";
        document.querySelectorAll("nav.tabs button").forEach(b =>
          b.classList.toggle("active", b.dataset.tab === "all"));
        render();
      }
      const idx = state.filtered.findIndex(e => e.id === state._pendingEntry);
      if (idx >= 0) openDrawer(idx);
      state._pendingEntry = null;
    }
  } catch (err) {
    document.getElementById("stats").textContent = "—";
    document.getElementById("columns").style.display = "none";
    document.getElementById("col-academia").parentElement.parentElement.insertAdjacentHTML(
      "beforebegin", `<div class="empty-state">${t().load_error(err.message)}</div>`);
  }
}

function renderFacets() {
  const buckets = { standards: [], layers: [], features: [], themes: [], market: [], other: [] };
  for (const [tg, n] of Object.entries(state.topicCounts)) buckets[topicGroup(tg)].push([tg, n]);
  for (const [grp, items] of Object.entries(buckets)) {
    items.sort((a,b) => b[1]-a[1]);
    const el = document.getElementById("facet-" + grp);
    if (!el) continue;
    if (!items.length) { el.parentElement.style.display = "none"; }
    else {
      el.parentElement.style.display = "";
      el.innerHTML = items.map(([name, count]) => {
        const checked = state.filters.topics.has(name);
        return `<label class="facet-item${checked ? " checked" : ""}">
          <input type="checkbox" data-facet="topic" data-value="${escAttr(name)}"${checked ? " checked" : ""}>
          <span class="label">${escHTML(name)}</span><span class="count">${count}</span>
        </label>`;
      }).join("");
    }
  }
  document.querySelectorAll('[data-facet]').forEach(el => {
    el.addEventListener("change", e => {
      const v = e.target.dataset.value;
      if (e.target.checked) state.filters.topics.add(v); else state.filters.topics.delete(v);
      render(); writeUrlState();
    });
  });
  document.querySelectorAll(".facet-group h3").forEach(h => {
    h.addEventListener("click", () => h.parentElement.classList.toggle("collapsed"));
  });
}

function entryMatches(e) {
  const f = state.filters;
  // Technology filter
  if (f.technology !== "all" && (e.technology || "wifi") !== f.technology) return false;
  const date = e.date_published || e.date_found;
  if (f.tab === "recent") {
    const c = new Date(); c.setDate(c.getDate()-7);
    if (new Date(date) < c) return false;
  } else if (f.tab === "recent30") {
    const c = new Date(); c.setDate(c.getDate()-30);
    if (new Date(date) < c) return false;
  } else if (f.tab === "recent365") {
    const c = new Date(); c.setDate(c.getDate()-365);
    if (new Date(date) < c) return false;
  }
  // Topic-detail filter: when tab=topics and topicPrimary is set, restrict to
  // entries that have this topic as primary OR include it in their secondary
  // list. Both groups are displayed in the per-category 3-column layout — the
  // breadcrumb header tells the user how many of each.
  if (f.tab === "topics" && f.topicPrimary) {
    if (e.topic_primary !== f.topicPrimary &&
        !(e.topics_secondary || []).includes(f.topicPrimary)) {
      return false;
    }
  }
  if (f.topics.size && !(e.topics || []).some(tg => f.topics.has(tg))) return false;
  if (f.search) {
    const q = f.search.toLowerCase();
    const hay = (e.search_blob || [e.title_en, e.title_zh, (e.topics||[]).join(" "), e.summary_short_en, e.summary_short_zh].join(" ")).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function pickLang(e, field) {
  const k = field + "_" + state.lang;
  return e[k] || e[field + "_" + (state.lang === "en" ? "zh" : "en")] || "";
}

function buildDensityHTML(items, cat) {
  // Bucket items by month over the last 12 months. items = [{e, idx}, ...]
  const now = new Date();
  const buckets = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const yy = d.getFullYear(), mm = d.getMonth() + 1;
    buckets.push({ key: `${yy}-${String(mm).padStart(2,"0")}`, year: yy, month: mm, count: 0 });
  }
  const idx = Object.fromEntries(buckets.map((b, i) => [b.key, i]));
  for (const { e } of items) {
    const date = e.date_published || e.date_found;
    if (!date) continue;
    const [yy, mm] = date.split("-");
    const k = `${yy}-${mm}`;
    if (k in idx) buckets[idx[k]].count++;
  }
  const max = Math.max(1, ...buckets.map(b => b.count));
  return `<div class="col-density" data-cat="${cat}">${
    buckets.map(b => {
      const h = Math.max(2, Math.round((b.count / max) * 22));
      const tip = `${t().month_label(b.year, b.month)} · ${b.count}`;
      return `<div class="bar" data-cat="${cat}" data-month-key="${b.key}" style="height:${h}px"><span class="tooltip">${tip}</span></div>`;
    }).join("")
  }</div>`;
}

function renderSources() {
  const labels = t();

  if (!data || !Array.isArray(data.sources)) {

  const byCat = { academia: [], industry: [], standards: [] };
  for (const s of data.sources) (byCat[s.category] || byCat.industry).push(s);
  // Sort within each category alphabetically by name (priority tier was removed
  // - the scout now visits every source on every run).
  for (const cat of CATEGORIES) byCat[cat].sort((a, b) => (a.name || "").localeCompare(b.name || ""));

  const cardHtml = (s) => {
    const open = s.url
      ? `<a class="open" href="${escAttr(s.url)}" target="_blank" rel="noopener">${labels.sources_open}</a>`
      : "";
    const nameInner = s.url
      ? `<a href="${escAttr(s.url)}" target="_blank" rel="noopener">${escHTML(s.name)}</a>`
      : escHTML(s.name);
    const meta = [];
    if (s.kind) meta.push(`<span class="pill kind">${escHTML(s.kind)}</span>`);
