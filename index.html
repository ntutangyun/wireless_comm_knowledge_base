<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wi-Fi Knowledge Base</title>
<style>
  /* ---------- THEME ---------- */
  :root {
    --fg: #18181b;
    --fg-2: #52525b;
    --fg-3: #a1a1aa;
    --bg: #ffffff;
    --bg-2: #fafafa;
    --bg-3: #f4f4f5;
    --border: #e4e4e7;
    --border-strong: #d4d4d8;
    --accent: #b40000;
    --accent-2: #fdf3f3;
    --accent-fg: #ffffff;
    --link: #0e6dc2;
    --code-bg: #f4f4f5;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 4px 12px rgba(0, 0, 0, 0.06);
    --shadow-strong: 0 8px 32px rgba(0, 0, 0, 0.12);
    --radius: 6px;
    --pad: 14px;
    --header-h: 52px;
    --side-w: 240px;
    --content-max: 920px;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", "JetBrains Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  [data-theme="dark"] {
    --fg: #f4f4f5;
    --fg-2: #a1a1aa;
    --fg-3: #71717a;
    --bg: #0c0c0e;
    --bg-2: #18181b;
    --bg-3: #27272a;
    --border: #27272a;
    --border-strong: #3f3f46;
    --accent: #ef4444;
    --accent-2: #1f1313;
    --accent-fg: #ffffff;
    --link: #60a5fa;
    --code-bg: #18181b;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 4px 12px rgba(0, 0, 0, 0.5);
    --shadow-strong: 0 8px 32px rgba(0, 0, 0, 0.7);
  }

  /* ---------- RESET ---------- */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    font-size: 14px; line-height: 1.55;
    color: var(--fg); background: var(--bg);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body.lang-zh { font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { font: inherit; }
  ::selection { background: var(--accent); color: var(--accent-fg); }

  /* ---------- HEADER ---------- */
  header.app-header {
    height: var(--header-h);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 30;
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px;
  }
  .brand {
    display: flex; align-items: baseline; gap: 10px;
    font-weight: 600; color: var(--fg);
  }
  .brand .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent); display: inline-block;
    transform: translateY(-1px);
  }
  .brand h1 {
    font-size: 14px; margin: 0; font-weight: 600; letter-spacing: -0.01em;
  }
  .brand .stats { color: var(--fg-3); font-size: 12px; font-variant-numeric: tabular-nums; }

  .header-spacer { flex: 1; }

  .header-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn, .lang-toggle {
    background: transparent; border: 1px solid var(--border);
    color: var(--fg-2);
    height: 30px; padding: 0 10px; border-radius: var(--radius);
    cursor: pointer; font-size: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: border-color 0.1s, color 0.1s;
  }
  .icon-btn:hover, .lang-toggle:hover { color: var(--fg); border-color: var(--border-strong); }
  .lang-toggle {
    padding: 0; overflow: hidden; border-radius: var(--radius);
  }
  .lang-toggle button {
    background: transparent; border: 0; color: var(--fg-2);
    height: 28px; padding: 0 10px; cursor: pointer; font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .lang-toggle button.active { background: var(--fg); color: var(--bg); }
  [data-theme="dark"] .lang-toggle button.active { background: var(--accent); color: var(--accent-fg); }
  .icon-btn svg { width: 14px; height: 14px; }

  /* ---------- TAB ROW ---------- */
  nav.tabs {
    display: flex; gap: 0; padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: var(--header-h); z-index: 20;
    overflow-x: auto;
  }
  nav.tabs button {
    background: transparent; border: 0;
    height: 38px; padding: 0 14px; cursor: pointer;
    color: var(--fg-2); font-size: 13px;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
  }
  nav.tabs button:hover { color: var(--fg); }
  nav.tabs button.active {
    color: var(--accent); border-bottom-color: var(--accent); font-weight: 600;
  }
  nav.tabs .kbd-hint {
    margin-left: auto; padding: 0 4px;
    font-size: 11px; color: var(--fg-3);
    display: flex; align-items: center; gap: 4px;
  }
  kbd {
    font-family: var(--mono); font-size: 10.5px;
    background: var(--bg-3); color: var(--fg-2);
    border: 1px solid var(--border);
    border-radius: 3px; padding: 1px 5px;
    line-height: 1.4; white-space: nowrap;
  }

  /* ---------- LAYOUT ---------- */
  main {
    display: grid;
    grid-template-columns: var(--side-w) 1fr;
    gap: 24px;
    padding: 18px 20px 60px;
    max-width: 1500px; margin: 0 auto;
    align-items: start;
  }

  /* ---------- SIDEBAR ---------- */
  aside.sidebar {
    position: sticky; top: calc(var(--header-h) + 38px + 1px);
    max-height: calc(100vh - var(--header-h) - 38px - 1px);
    overflow-y: auto;
    padding: 4px 0;
    font-size: 13px;
  }
  .search-wrap { position: relative; }
  .search {
    width: 100%; padding: 8px 32px 8px 32px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font: inherit; background: var(--bg-2); color: var(--fg);
    outline: none;
  }
  .search:focus { border-color: var(--accent); background: var(--bg); }
  .search-icon { position: absolute; left: 9px; top: 9px; color: var(--fg-3); pointer-events: none; }
  .search-kbd {
    position: absolute; right: 8px; top: 7px; pointer-events: none;
  }

  .facet-group { margin-top: 18px; }
  .facet-group h3 {
    margin: 0 0 6px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--fg-3);
    cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 4px;
  }
  .facet-group h3 .chev { transition: transform 0.15s; opacity: 0.5; }
  .facet-group.collapsed h3 .chev { transform: rotate(-90deg); }
  .facet-group.collapsed .facet-list { display: none; }
  .facet-list { display: flex; flex-direction: column; gap: 1px; }
  .facet-item {
    display: flex; align-items: center; gap: 8px;
    padding: 3px 6px;
    cursor: pointer; border-radius: 4px;
    color: var(--fg-2);
    transition: background 0.1s, color 0.1s;
  }
  .facet-item:hover { background: var(--bg-3); color: var(--fg); }
  .facet-item input { margin: 0; accent-color: var(--accent); }
  .facet-item .label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .facet-item .count { color: var(--fg-3); font-size: 11px; font-variant-numeric: tabular-nums; }
  .facet-item.checked .label { color: var(--fg); font-weight: 500; }
  .facet-clear {
    margin-top: 8px; padding: 0; background: transparent; border: 0;
    color: var(--fg-3); font-size: 12px; cursor: pointer;
  }
  .facet-clear:hover { color: var(--accent); }

  /* ---------- RESULTS ---------- */
  section.results { min-width: 0; }
  .result-bar {
    display: flex; align-items: center; gap: 12px;
    color: var(--fg-3); font-size: 12px;
    padding: 0 0 10px;
    font-variant-numeric: tabular-nums;
  }
  .result-bar .applied {
    display: flex; gap: 6px; flex-wrap: wrap; flex: 1; min-width: 0;
  }
  .applied .chip {
    background: var(--accent-2); color: var(--accent);
    padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 500;
    cursor: pointer; border: 1px solid transparent;
  }
  .applied .chip:hover { border-color: var(--accent); }
  .applied .chip::after { content: "  ×"; opacity: 0.6; }

  /* ---------- ENTRY CARDS ---------- */
  .entries-list { display: flex; flex-direction: column; gap: 8px; }
  .entry-card {
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg);
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.1s, background 0.1s, transform 0.05s;
    position: relative;
  }
  .entry-card:hover {
    border-color: var(--border-strong);
    background: var(--bg-2);
  }
  .entry-card.focused {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-2);
  }
  .entry-card .row1 {
    display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px;
  }
  .entry-card .title {
    flex: 1; font-size: 14px; font-weight: 600; color: var(--fg);
    line-height: 1.35; min-width: 0;
  }
  .entry-card .date {
    font-size: 12px; color: var(--fg-3);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .entry-card .meta {
    display: flex; gap: 5px; flex-wrap: wrap; align-items: center;
    margin: 6px 0 0;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    height: 19px; padding: 0 7px; border-radius: 3px;
    font-size: 11px; font-family: var(--mono);
    background: var(--bg-3); color: var(--fg-2); border: 1px solid var(--border);
    line-height: 1; white-space: nowrap;
  }
  .pill.type {
    text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px;
    background: transparent;
  }
  .pill.topic { background: var(--bg-3); }
  .pill.topic.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }

  .novelty {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--fg-3);
    font-variant-numeric: tabular-nums;
  }
  .novelty-bar {
    display: inline-flex; gap: 2px; height: 8px;
  }
  .novelty-bar i {
    width: 6px; background: var(--bg-3); border-radius: 1px;
    display: inline-block;
  }
  .novelty-bar i.on { background: var(--accent); }

  .entry-card .summary {
    margin: 8px 0 0; color: var(--fg-2);
    font-size: 13px; line-height: 1.55;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .entry-card .footer {
    margin-top: 10px;
    display: flex; align-items: center; gap: 12px;
    font-size: 11px; color: var(--fg-3);
  }
  .entry-card .img-count {
    display: inline-flex; align-items: center; gap: 4px;
  }
  .entry-card .footer a {
    color: var(--fg-3);
  }
  .entry-card .footer a:hover { color: var(--accent); }
  .entry-card .footer .right { margin-left: auto; }

  .empty-state {
    text-align: center; padding: 80px 20px;
    color: var(--fg-3); font-size: 14px;
  }
  .empty-state code {
    background: var(--bg-3); padding: 2px 6px; border-radius: 3px;
    font-family: var(--mono); font-size: 12px;
  }

  /* ---------- DRAWER ---------- */
  .drawer-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0); pointer-events: none;
    transition: background 0.2s ease;
    z-index: 40;
  }
  .drawer-overlay.open {
    background: rgba(0, 0, 0, 0.18);
    pointer-events: auto;
  }
  [data-theme="dark"] .drawer-overlay.open { background: rgba(0, 0, 0, 0.55); }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(720px, 100%);
    background: var(--bg);
    border-left: 1px solid var(--border);
    box-shadow: var(--shadow-strong);
    transform: translateX(100%);
    transition: transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
    z-index: 50;
    display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    height: var(--header-h);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    padding: 0 12px 0 16px;
    background: var(--bg);
    flex-shrink: 0;
  }
  .drawer-head .pos {
    color: var(--fg-3); font-size: 12px;
    font-variant-numeric: tabular-nums;
    margin-right: auto;
  }
  .drawer-body {
    overflow-y: auto;
    padding: 28px 36px 80px;
    scroll-behavior: smooth;
  }
  .drawer-body h2.entry-title {
    margin: 0 0 8px; font-size: 22px; font-weight: 700;
    line-height: 1.25; letter-spacing: -0.01em;
    color: var(--fg);
  }
  .drawer-body .meta-row {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    margin: 0 0 24px;
    font-size: 12px;
  }
  .drawer-body .meta-row .date {
    color: var(--fg-2); font-variant-numeric: tabular-nums;
  }
  .drawer-body .body-html {
    font-size: 14.5px; line-height: 1.65; color: var(--fg);
    max-width: 720px;
  }
  .drawer-body .body-html h3 {
    margin: 28px 0 10px; font-size: 14px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--fg-2);
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .drawer-body .body-html h3:first-child { margin-top: 0; }
  .drawer-body .body-html h4 { margin: 20px 0 8px; font-size: 14px; font-weight: 600; }
  .drawer-body .body-html p { margin: 0 0 14px; }
  .drawer-body .body-html ul {
    margin: 0 0 14px; padding-left: 22px;
  }
  .drawer-body .body-html li { margin-bottom: 4px; }
  .drawer-body .body-html code {
    font-family: var(--mono); font-size: 0.86em;
    background: var(--code-bg); padding: 1px 5px;
    border-radius: 3px; color: var(--fg);
  }
  .drawer-body .body-html strong { color: var(--fg); font-weight: 600; }
  .drawer-body .body-html em { color: var(--fg); }
  .drawer-body .images-block {
    margin: 28px 0;
    display: flex; flex-direction: column; gap: 18px;
  }
  .drawer-body .images-block figure {
    margin: 0;
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; background: var(--bg-2);
  }
  .drawer-body .images-block img {
    display: block; width: 100%; height: auto;
    background: var(--bg-2);
  }
  .drawer-body .images-block figcaption {
    padding: 10px 14px; font-size: 12.5px;
    color: var(--fg-2); border-top: 1px solid var(--border);
  }
  .drawer-foot {
    border-top: 1px solid var(--border);
    background: var(--bg);
    padding: 12px 24px;
    display: flex; gap: 12px; flex-shrink: 0;
    font-size: 13px;
  }
  .drawer-foot .btn {
    background: var(--bg-2); border: 1px solid var(--border);
    color: var(--fg-2); padding: 7px 14px; border-radius: var(--radius);
    cursor: pointer; text-decoration: none;
    transition: border-color 0.1s, color 0.1s;
  }
  .drawer-foot .btn:hover {
    color: var(--fg); border-color: var(--border-strong); text-decoration: none;
  }
  .drawer-foot .btn.primary {
    background: var(--accent); color: var(--accent-fg); border-color: var(--accent);
  }
  .drawer-foot .btn.primary:hover { color: var(--accent-fg); }
  .drawer-foot .spacer { flex: 1; }

  /* ---------- HELP MODAL ---------- */
  .help-modal {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(0, 0, 0, 0.4);
    display: none; align-items: center; justify-content: center;
  }
  .help-modal.open { display: flex; }
  .help-modal .panel {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 24px 28px;
    max-width: 460px; width: calc(100% - 32px);
    box-shadow: var(--shadow-strong);
  }
  .help-modal h2 { margin: 0 0 16px; font-size: 16px; }
  .help-modal table { border-collapse: collapse; width: 100%; }
  .help-modal td { padding: 5px 0; font-size: 13px; }
  .help-modal td:first-child { width: 110px; }

  /* ---------- MOBILE ---------- */
  @media (max-width: 820px) {
    main { grid-template-columns: 1fr; }
    aside.sidebar { position: static; max-height: none; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .drawer { width: 100%; }
    .drawer-body { padding: 20px 18px 80px; }
    nav.tabs .kbd-hint { display: none; }
  }
</style>
</head>
<body>

<!-- kb.js defines window.KB_DATA. Loaded first so the file:// case works
     without a local web server (browsers block fetch() under file://). -->
<script src="kb.js" onerror="window.__KB_JS_FAILED=true"></script>

<header class="app-header">
  <div class="brand">
    <span class="dot" aria-hidden="true"></span>
    <h1 id="header-title">Wi-Fi Knowledge Base</h1>
    <span class="stats" id="stats">…</span>
  </div>
  <div class="header-spacer"></div>
  <div class="header-actions">
    <div class="lang-toggle" id="lang-toggle" role="group" aria-label="Language">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="zh">中文</button>
    </div>
    <button class="icon-btn" id="theme-btn" title="Toggle theme (t)" aria-label="Toggle theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="theme-icon"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>
    </button>
    <button class="icon-btn" id="help-btn" title="Show keyboard shortcuts (?)" aria-label="Help">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </button>
    <a class="icon-btn" href="https://github.com/ntutangyun/wifi_knowledge_base" target="_blank" rel="noopener" title="GitHub repo">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.4-4-1.4-.5-1.4-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3"/></svg>
    </a>
  </div>
</header>

<nav class="tabs" id="tabs">
  <button data-tab="all" class="active"></button>
  <button data-tab="recent"></button>
  <button data-tab="recent30"></button>
  <span class="kbd-hint"><kbd>1</kbd><kbd>2</kbd><kbd>3</kbd></span>
</nav>

<main>
  <aside class="sidebar">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search" id="search" autocomplete="off" />
      <span class="search-kbd"><kbd>/</kbd></span>
    </div>

    <button class="facet-clear" id="facet-clear" hidden></button>

    <div class="facet-group" data-facet-group="type">
      <h3><span class="chev">▾</span><span data-i18n="facet_type"></span></h3>
      <div class="facet-list" id="facet-type"></div>
    </div>

    <div class="facet-group" data-facet-group="standards">
      <h3><span class="chev">▾</span><span data-i18n="group_standards"></span></h3>
      <div class="facet-list" id="facet-standards"></div>
    </div>

    <div class="facet-group" data-facet-group="layers">
      <h3><span class="chev">▾</span><span data-i18n="group_layers"></span></h3>
      <div class="facet-list" id="facet-layers"></div>
    </div>

    <div class="facet-group" data-facet-group="features">
      <h3><span class="chev">▾</span><span data-i18n="group_features"></span></h3>
      <div class="facet-list" id="facet-features"></div>
    </div>

    <div class="facet-group" data-facet-group="themes">
      <h3><span class="chev">▾</span><span data-i18n="group_themes"></span></h3>
      <div class="facet-list" id="facet-themes"></div>
    </div>

    <div class="facet-group" data-facet-group="market">
      <h3><span class="chev">▾</span><span data-i18n="group_market"></span></h3>
      <div class="facet-list" id="facet-market"></div>
    </div>

    <div class="facet-group" data-facet-group="other">
      <h3><span class="chev">▾</span><span data-i18n="group_other"></span></h3>
      <div class="facet-list" id="facet-other"></div>
    </div>
  </aside>

  <section class="results">
    <div class="result-bar">
      <div class="applied" id="applied-chips"></div>
      <div id="result-count"></div>
    </div>
    <div class="entries-list" id="entries"></div>
  </section>
</main>

<div class="drawer-overlay" id="drawer-overlay"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <header class="drawer-head">
    <button class="icon-btn" id="drawer-prev" title="Previous (k)" aria-label="Previous">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="icon-btn" id="drawer-next" title="Next (j)" aria-label="Next">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <span class="pos" id="drawer-pos"></span>
    <button class="icon-btn" id="drawer-close" title="Close (Esc)" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </header>
  <div class="drawer-body" id="drawer-body"></div>
  <footer class="drawer-foot">
    <a class="btn primary" id="drawer-original" target="_blank" rel="noopener"></a>
    <a class="btn" id="drawer-source" target="_blank"></a>
    <span class="spacer"></span>
    <button class="btn" id="drawer-copy"></button>
  </footer>
</aside>

<div class="help-modal" id="help-modal">
  <div class="panel">
    <h2 data-i18n="help_title"></h2>
    <table id="help-table"></table>
    <button class="btn" id="help-close" style="margin-top:14px;border:1px solid var(--border);padding:6px 12px;border-radius:var(--radius);background:transparent;color:var(--fg-2);cursor:pointer;">Close</button>
  </div>
</div>

<script>
//===========================================================================
// I18N
//===========================================================================
const I18N = {
  en: {
    title: "Wi-Fi Knowledge Base",
    search_placeholder: "Search title, summary, topics…",
    facet_type: "Type",
    group_standards: "Standards",
    group_layers: "Layers",
    group_features: "Features",
    group_themes: "Themes",
    group_market: "Market",
    group_other: "Other topics",
    tab_all: "All",
    tab_recent: "Last 7 days",
    tab_recent30: "Last 30 days",
    of_n: (n, total) => `${n} of ${total}`,
    no_match: "No entries match the current filters.",
    last_updated: "updated",
    entries_label: "entries",
    open_original: "Read original ↗",
    open_source: "Source on GitHub",
    copy_citation: "Copy citation",
    copied: "Copied!",
    pos: (i, n) => `${i + 1} / ${n}`,
    novelty: "novelty",
    images_label: "images",
    facet_clear: "Clear filters",
    help_title: "Keyboard shortcuts",
    load_error: (msg) =>
      `No <code>kb.json</code> yet, or <code>kb.js</code> failed (${msg}). ` +
      `Run <code>python scripts/rebuild_index.py</code> to regenerate.`,
  },
  zh: {
    title: "Wi-Fi 知识库",
    search_placeholder: "搜索标题、摘要、标签…",
    facet_type: "类型",
    group_standards: "标准",
    group_layers: "协议层",
    group_features: "特性",
    group_themes: "主题",
    group_market: "市场",
    group_other: "其他标签",
    tab_all: "全部",
    tab_recent: "最近 7 天",
    tab_recent30: "最近 30 天",
    of_n: (n, total) => `共 ${total} · 命中 ${n}`,
    no_match: "当前筛选条件下没有条目。",
    last_updated: "更新于",
    entries_label: "条",
    open_original: "查看原文 ↗",
    open_source: "GitHub 源文件",
    copy_citation: "复制引用",
    copied: "已复制！",
    pos: (i, n) => `${i + 1} / ${n}`,
    novelty: "新颖度",
    images_label: "图",
    facet_clear: "清除筛选",
    help_title: "键盘快捷键",
    load_error: (msg) =>
      `尚无 <code>kb.json</code>，或 <code>kb.js</code> 加载失败（${msg}）。` +
      `请运行 <code>python scripts/rebuild_index.py</code> 重建。`,
  },
};

const SHORTCUTS = [
  ["/", "Focus search", "聚焦搜索"],
  ["j / ↓", "Next entry", "下一条"],
  ["k / ↑", "Previous entry", "上一条"],
  ["Enter", "Open entry", "打开条目"],
  ["Esc", "Close drawer / blur search", "关闭抽屉 / 取消搜索"],
  ["1 2 3", "Switch tab", "切换标签页"],
  ["t", "Toggle theme", "切换主题"],
  ["l", "Toggle language", "切换语言"],
  ["g", "Jump to source URL", "跳转到原文"],
  ["?", "Show this help", "显示帮助"],
];

// Topic groups — order matters (first match wins).
const TOPIC_GROUPS = {
  standards: ["802.11a", "802.11b", "802.11g", "802.11n", "802.11ac",
              "802.11ax", "802.11be", "802.11bn", "802.11bf", "802.11bq",
              "802.11ba", "802.11az"],
  layers: ["MAC-layer", "PHY-layer", "APP-layer"],
  features: ["MLO", "MAPC", "R-TWT", "TWT", "OFDMA", "EDCA", "MU-MIMO",
             "spatial-reuse", "ELR-PPDU", "UEQM"],
  themes: ["WiFi-sensing", "agentic-AI", "generative-AI", "roaming",
           "scheduling", "security", "power-save"],
  market: ["IoT", "XR", "products", "automotive", "industrial"],
};
function topicGroup(t) {
  for (const [g, list] of Object.entries(TOPIC_GROUPS)) {
    if (list.includes(t)) return g;
  }
  return "other";
}

//===========================================================================
// STATE
//===========================================================================
const PAGE_SIZE = 50;
let state = {
  data: null,
  entries: [],
  topicCounts: {},
  typeCounts: {},
  filtered: [],
  filters: {
    tab: "all",
    search: "",
    types: new Set(),
    topics: new Set(),
  },
  lang: localStorage.getItem("kb_lang") || "en",
  theme: localStorage.getItem("kb_theme") ||
         (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"),
  drawerIdx: -1,        // index into filtered[]
  focusIdx: -1,         // for keyboard j/k navigation in card list
};

function t() { return I18N[state.lang]; }

//===========================================================================
// URL state (hash)
//===========================================================================
function readUrlState() {
  const h = location.hash.replace(/^#/, "");
  if (!h) return;
  const params = new URLSearchParams(h);
  if (params.has("tab")) state.filters.tab = params.get("tab");
  if (params.has("q")) state.filters.search = params.get("q");
  if (params.has("types")) state.filters.types = new Set(params.get("types").split(",").filter(Boolean));
  if (params.has("topics")) state.filters.topics = new Set(params.get("topics").split(",").filter(Boolean));
  if (params.has("lang")) state.lang = params.get("lang");
  if (params.has("entry")) state._pendingEntry = params.get("entry");
}
function writeUrlState() {
  const p = new URLSearchParams();
  if (state.filters.tab !== "all") p.set("tab", state.filters.tab);
  if (state.filters.search) p.set("q", state.filters.search);
  if (state.filters.types.size) p.set("types", [...state.filters.types].join(","));
  if (state.filters.topics.size) p.set("topics", [...state.filters.topics].join(","));
  if (state.lang !== "en") p.set("lang", state.lang);
  if (state.drawerIdx >= 0 && state.filtered[state.drawerIdx]) p.set("entry", state.filtered[state.drawerIdx].id);
  const hash = p.toString();
  history.replaceState(null, "", hash ? "#" + hash : location.pathname);
}

//===========================================================================
// I18N application
//===========================================================================
function applyLang() {
  document.documentElement.lang = state.lang === "zh" ? "zh" : "en";
  document.body.classList.toggle("lang-zh", state.lang === "zh");
  const labels = t();
  document.title = labels.title;
  document.getElementById("header-title").textContent = labels.title;
  document.getElementById("search").placeholder = labels.search_placeholder;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (labels[key]) el.textContent = labels[key];
  });
  const tabBtns = document.querySelectorAll("nav.tabs button");
  tabBtns[0].textContent = labels.tab_all;
  tabBtns[1].textContent = labels.tab_recent;
  tabBtns[2].textContent = labels.tab_recent30;
  document.querySelectorAll("#lang-toggle button").forEach(b => {
    b.classList.toggle("active", b.dataset.lang === state.lang);
  });
  document.getElementById("facet-clear").textContent = labels.facet_clear;
  document.getElementById("drawer-original").textContent = labels.open_original;
  document.getElementById("drawer-source").textContent = labels.open_source;
  document.getElementById("drawer-copy").textContent = labels.copy_citation;
  // Help table
  const ht = document.getElementById("help-table");
  ht.innerHTML = SHORTCUTS.map(([k, en, zh]) =>
    `<tr><td><kbd>${k.replace(/ /g, "</kbd> <kbd>")}</kbd></td><td>${state.lang === "zh" ? zh : en}</td></tr>`
  ).join("");
}

function applyTheme() {
  document.documentElement.setAttribute("data-theme", state.theme);
  // Swap icon between sun (when in dark) and moon (when in light)
  const dark = state.theme === "dark";
  const path = document.querySelector("#theme-icon path");
  if (dark) {
    // Sun glyph
    path.setAttribute("d", "M12 1v2 M12 21v2 M4.22 4.22l1.42 1.42 M18.36 18.36l1.42 1.42 M1 12h2 M21 12h2 M4.22 19.78l1.42-1.42 M18.36 5.64l1.42-1.42");
    document.querySelector("#theme-icon").innerHTML =
      '<circle cx="12" cy="12" r="4"/>' +
      '<line x1="12" y1="2" x2="12" y2="4"/>' +
      '<line x1="12" y1="20" x2="12" y2="22"/>' +
      '<line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/>' +
      '<line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/>' +
      '<line x1="2" y1="12" x2="4" y2="12"/>' +
      '<line x1="20" y1="12" x2="22" y2="12"/>' +
      '<line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/>' +
      '<line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/>';
  } else {
    document.querySelector("#theme-icon").innerHTML =
      '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/>';
  }
}

//===========================================================================
// LOAD
//===========================================================================
async function load() {
  applyTheme();
  readUrlState();
  applyLang();

  try {
    let data;
    if (window.KB_DATA && Array.isArray(window.KB_DATA.entries)) {
      data = window.KB_DATA;
    } else {
      const r = await fetch("kb.json", { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      data = await r.json();
    }
    state.data = data;
    state.entries = data.entries || [];
    state.topicCounts = data.topic_counts || {};
    state.typeCounts = data.type_counts || {};

    document.getElementById("stats").textContent =
      `${state.entries.length} ${t().entries_label} · ${t().last_updated} ${data.last_updated || "—"}`;

    renderFacets();
    render();

    // Open entry deep-linked from URL
    if (state._pendingEntry) {
      const idx = state.filtered.findIndex(e => e.id === state._pendingEntry);
      if (idx >= 0) openDrawer(idx);
      state._pendingEntry = null;
    }
  } catch (err) {
    document.getElementById("stats").textContent = "—";
    document.getElementById("entries").innerHTML =
      `<div class="empty-state">${t().load_error(err.message)}</div>`;
  }
}

//===========================================================================
// FACETS
//===========================================================================
function renderFacets() {
  // Type
  document.getElementById("facet-type").innerHTML = facetItems(
    Object.entries(state.typeCounts), "type"
  );
  // Topics, partitioned by group
  const buckets = { standards: [], layers: [], features: [], themes: [], market: [], other: [] };
  for (const [t, n] of Object.entries(state.topicCounts)) {
    buckets[topicGroup(t)].push([t, n]);
  }
  for (const [grp, items] of Object.entries(buckets)) {
    items.sort((a, b) => b[1] - a[1]);
    const el = document.getElementById("facet-" + grp);
    if (!el) continue;
    if (!items.length) {
      el.parentElement.style.display = "none";
    } else {
      el.parentElement.style.display = "";
      el.innerHTML = facetItems(items, "topic");
    }
  }
  bindFacets();

  // Collapsible group headers
  document.querySelectorAll(".facet-group h3").forEach(h => {
    h.addEventListener("click", () => h.parentElement.classList.toggle("collapsed"));
  });
}
function facetItems(entries, kind) {
  return entries.map(([name, count]) => {
    const setName = kind === "type" ? "types" : "topics";
    const checked = state.filters[setName].has(name);
    return `<label class="facet-item${checked ? " checked" : ""}">
      <input type="checkbox" data-facet="${kind}" data-value="${escAttr(name)}"${checked ? " checked" : ""}>
      <span class="label">${escHTML(name)}</span>
      <span class="count">${count}</span>
    </label>`;
  }).join("");
}
function bindFacets() {
  document.querySelectorAll('[data-facet]').forEach(el => {
    el.addEventListener("change", e => {
      const set = state.filters[e.target.dataset.facet === "type" ? "types" : "topics"];
      const v = e.target.dataset.value;
      if (e.target.checked) set.add(v); else set.delete(v);
      render(); writeUrlState();
    });
  });
}

//===========================================================================
// FILTER + RENDER
//===========================================================================
function entryMatches(e) {
  const f = state.filters;
  if (f.tab === "recent") {
    const c = new Date(); c.setDate(c.getDate() - 7);
    if (new Date(e.date_found) < c) return false;
  }
  if (f.tab === "recent30") {
    const c = new Date(); c.setDate(c.getDate() - 30);
    if (new Date(e.date_found) < c) return false;
  }
  if (f.types.size && !f.types.has(e.type)) return false;
  if (f.topics.size && !(e.topics || []).some(tg => f.topics.has(tg))) return false;
  if (f.search) {
    const q = f.search.toLowerCase();
    const hay = (e.search_blob ||
      [e.title_en, e.title_zh, (e.topics || []).join(" "),
       e.summary_short_en, e.summary_short_zh].join(" ")).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function pickLang(e, field) {
  const k = field + "_" + state.lang;
  return e[k] || e[field + "_" + (state.lang === "en" ? "zh" : "en")] || "";
}
function render() {
  state.filtered = state.entries.filter(entryMatches);
  document.getElementById("result-count").textContent =
    t().of_n(state.filtered.length, state.entries.length);
  renderAppliedChips();
  document.getElementById("facet-clear").hidden =
    !(state.filters.types.size || state.filters.topics.size || state.filters.search);

  if (!state.filtered.length) {
    document.getElementById("entries").innerHTML =
      `<div class="empty-state">${t().no_match}</div>`;
    return;
  }
  document.getElementById("entries").innerHTML =
    state.filtered.map((e, i) => cardHTML(e, i)).join("");
  bindCards();
  applyFocus();
}
function renderAppliedChips() {
  const c = document.getElementById("applied-chips");
  const chips = [];
  if (state.filters.search) chips.push({ kind: "search", value: state.filters.search, label: `“${state.filters.search}”` });
  state.filters.types.forEach(v => chips.push({ kind: "type", value: v, label: v }));
  state.filters.topics.forEach(v => chips.push({ kind: "topic", value: v, label: v }));
  c.innerHTML = chips.map(ch =>
    `<span class="chip" data-kind="${ch.kind}" data-value="${escAttr(ch.value)}">${escHTML(ch.label)}</span>`
  ).join("");
  c.querySelectorAll(".chip").forEach(el => {
    el.addEventListener("click", () => {
      const { kind, value } = el.dataset;
      if (kind === "search") {
        state.filters.search = "";
        document.getElementById("search").value = "";
      } else if (kind === "type") state.filters.types.delete(value);
      else if (kind === "topic") state.filters.topics.delete(value);
      render(); writeUrlState();
      // Update facet checkboxes
      renderFacets();
    });
  });
}
function cardHTML(e, i) {
  const title = pickLang(e, "title");
  const summary = pickLang(e, "summary_short");
  const novelty = e.novelty_score || 0;
  const noveltyHTML = `<span class="novelty" title="${t().novelty} ${novelty}/5">
    <span class="novelty-bar" aria-label="novelty ${novelty} of 5">
      ${[1,2,3,4,5].map(n => `<i${n <= novelty ? " class=\"on\"" : ""}></i>`).join("")}
    </span></span>`;
  const topicsHTML = (e.topics || []).map(tg => {
    const active = state.filters.topics.has(tg) ? " active" : "";
    return `<span class="pill topic${active}" data-topic="${escAttr(tg)}">${escHTML(tg)}</span>`;
  }).join("");
  const imgCount = (e.images || []).length;
  return `<article class="entry-card" data-idx="${i}">
    <div class="row1">
      <div class="title">${escHTML(title)}</div>
      <div class="date">${e.date_found || ""}</div>
    </div>
    <div class="meta">
      <span class="pill type">${escHTML(e.type || "")}</span>
      ${noveltyHTML}
      ${topicsHTML}
    </div>
    <div class="summary">${escHTML(summary)}</div>
    <div class="footer">
      ${imgCount ? `<span class="img-count">${imgCount} ${t().images_label}</span>` : ""}
      <span class="right"><a href="${escAttr(e.url || "#")}" target="_blank" rel="noopener" data-stop>${t().open_original}</a></span>
    </div>
  </article>`;
}
function bindCards() {
  document.querySelectorAll(".entry-card").forEach(card => {
    card.addEventListener("click", e => {
      // Don't open the drawer if user clicked a topic pill or footer link
      if (e.target.closest("[data-topic]")) {
        const tg = e.target.closest("[data-topic]").dataset.topic;
        if (state.filters.topics.has(tg)) state.filters.topics.delete(tg);
        else state.filters.topics.add(tg);
        render(); renderFacets(); writeUrlState();
        return;
      }
      if (e.target.closest("[data-stop]")) return;
      openDrawer(parseInt(card.dataset.idx, 10));
    });
  });
}

//===========================================================================
// DRAWER
//===========================================================================
function openDrawer(idx) {
  if (idx < 0 || idx >= state.filtered.length) return;
  state.drawerIdx = idx;
  state.focusIdx = idx;
  renderDrawer();
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawer-overlay").classList.add("open");
  document.getElementById("drawer").setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
  writeUrlState();
  applyFocus();
}
function closeDrawer() {
  state.drawerIdx = -1;
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawer-overlay").classList.remove("open");
  document.getElementById("drawer").setAttribute("aria-hidden", "true");
  document.body.style.overflow = "";
  writeUrlState();
}
function drawerStep(delta) {
  if (state.drawerIdx < 0) return;
  const next = state.drawerIdx + delta;
  if (next < 0 || next >= state.filtered.length) return;
  state.drawerIdx = next;
  state.focusIdx = next;
  renderDrawer();
  // Reset scroll
  document.getElementById("drawer-body").scrollTop = 0;
  writeUrlState();
  applyFocus();
}
function renderDrawer() {
  const e = state.filtered[state.drawerIdx];
  if (!e) return;
  const title = pickLang(e, "title");
  const bodyHTML = e["body_html_" + state.lang] || e["body_html_" + (state.lang === "en" ? "zh" : "en")] || "";
  const novelty = e.novelty_score || 0;
  const noveltyBar = `<span class="novelty"><span class="novelty-bar">
    ${[1,2,3,4,5].map(n => `<i${n <= novelty ? " class=\"on\"" : ""}></i>`).join("")}
    </span><span style="margin-left:6px">${t().novelty} ${novelty}/5</span></span>`;
  const topics = (e.topics || []).map(tg =>
    `<span class="pill topic">${escHTML(tg)}</span>`
  ).join("");
  const captionKey = state.lang === "zh" ? "caption_zh" : "caption_en";
  const imagesHTML = !(e.images && e.images.length) ? "" :
    `<div class="images-block">${
      e.images.map(im =>
        `<figure>
          <a href="${escAttr(im.url)}" target="_blank" rel="noopener">
            <img src="${escAttr(im.url)}" alt="${escAttr(im[captionKey] || "")}" loading="lazy">
          </a>
          ${im[captionKey] ? `<figcaption>${escHTML(im[captionKey])}</figcaption>` : ""}
        </figure>`
      ).join("")
    }</div>`;
  document.getElementById("drawer-body").innerHTML = `
    <h2 class="entry-title">${escHTML(title)}</h2>
    <div class="meta-row">
      <span class="date">${e.date_found || ""}</span>
      <span class="pill type">${escHTML(e.type || "")}</span>
      ${noveltyBar}
      ${topics}
    </div>
    <div class="body-html">${bodyHTML}</div>
    ${imagesHTML}
  `;
  document.getElementById("drawer-pos").textContent =
    t().pos(state.drawerIdx, state.filtered.length);
  const orig = document.getElementById("drawer-original");
  orig.href = e.url || "#";
  if (!e.url) orig.style.display = "none"; else orig.style.display = "";
  const src = document.getElementById("drawer-source");
  src.href = "https://github.com/ntutangyun/wifi_knowledge_base/blob/main/" + (e.entry_path || "");
}

//===========================================================================
// FOCUS / KEYBOARD NAV
//===========================================================================
function applyFocus() {
  document.querySelectorAll(".entry-card").forEach((c, i) => {
    c.classList.toggle("focused", i === state.focusIdx);
  });
  if (state.focusIdx >= 0) {
    const el = document.querySelectorAll(".entry-card")[state.focusIdx];
    if (el) el.scrollIntoView({ block: "nearest", behavior: "smooth" });
  }
}
function moveFocus(delta) {
  const n = state.filtered.length;
  if (!n) return;
  if (state.focusIdx < 0) state.focusIdx = 0;
  else state.focusIdx = Math.max(0, Math.min(n - 1, state.focusIdx + delta));
  applyFocus();
}

//===========================================================================
// HELPERS
//===========================================================================
function escHTML(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function escAttr(s) { return escHTML(s); }
function copyCitation() {
  const e = state.filtered[state.drawerIdx];
  if (!e) return;
  const title = pickLang(e, "title");
  const txt = `${title}. ${e.date_found || ""}. ${e.url || ""}`;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById("drawer-copy");
    const orig = btn.textContent;
    btn.textContent = t().copied;
    setTimeout(() => { btn.textContent = orig; }, 1500);
  });
}

//===========================================================================
// EVENT WIRING
//===========================================================================
document.querySelectorAll("nav.tabs button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("nav.tabs button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.filters.tab = btn.dataset.tab;
    state.focusIdx = -1;
    render(); writeUrlState();
  });
});
document.getElementById("search").addEventListener("input", e => {
  state.filters.search = e.target.value;
  state.focusIdx = -1;
  render(); writeUrlState();
});
document.querySelectorAll("#lang-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    state.lang = btn.dataset.lang;
    localStorage.setItem("kb_lang", state.lang);
    applyLang();
    if (state.entries.length) {
      document.getElementById("stats").textContent =
        `${state.entries.length} ${t().entries_label} · ${t().last_updated} ${state.data.last_updated || "—"}`;
      render();
      if (state.drawerIdx >= 0) renderDrawer();
    }
    writeUrlState();
  });
});
document.getElementById("theme-btn").addEventListener("click", () => {
  state.theme = state.theme === "dark" ? "light" : "dark";
  localStorage.setItem("kb_theme", state.theme);
  applyTheme();
});
document.getElementById("drawer-close").addEventListener("click", closeDrawer);
document.getElementById("drawer-overlay").addEventListener("click", closeDrawer);
document.getElementById("drawer-prev").addEventListener("click", () => drawerStep(-1));
document.getElementById("drawer-next").addEventListener("click", () => drawerStep(1));
document.getElementById("drawer-copy").addEventListener("click", copyCitation);
document.getElementById("facet-clear").addEventListener("click", () => {
  state.filters.types.clear();
  state.filters.topics.clear();
  state.filters.search = "";
  document.getElementById("search").value = "";
  render(); renderFacets(); writeUrlState();
});
document.getElementById("help-btn").addEventListener("click", () =>
  document.getElementById("help-modal").classList.add("open"));
document.getElementById("help-close").addEventListener("click", () =>
  document.getElementById("help-modal").classList.remove("open"));
document.getElementById("help-modal").addEventListener("click", e => {
  if (e.target.id === "help-modal") e.currentTarget.classList.remove("open");
});

// Keyboard shortcuts
window.addEventListener("keydown", e => {
  const inField = e.target.matches("input, textarea, [contenteditable]");
  const drawerOpen = state.drawerIdx >= 0;
  if (e.key === "Escape") {
    if (document.getElementById("help-modal").classList.contains("open")) {
      document.getElementById("help-modal").classList.remove("open"); return;
    }
    if (drawerOpen) { closeDrawer(); return; }
    if (inField) { e.target.blur(); return; }
  }
  if (inField) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;

  if (e.key === "/") {
    e.preventDefault();
    document.getElementById("search").focus();
    return;
  }
  if (e.key === "?") {
    document.getElementById("help-modal").classList.add("open");
    return;
  }
  if (e.key === "t") { document.getElementById("theme-btn").click(); return; }
  if (e.key === "l") {
    const next = state.lang === "en" ? "zh" : "en";
    document.querySelector(`#lang-toggle button[data-lang="${next}"]`).click();
    return;
  }
  if (e.key === "g" && drawerOpen) {
    const e2 = state.filtered[state.drawerIdx];
    if (e2 && e2.url) window.open(e2.url, "_blank", "noopener");
    return;
  }
  if (e.key === "1") { document.querySelector('[data-tab="all"]').click(); return; }
  if (e.key === "2") { document.querySelector('[data-tab="recent"]').click(); return; }
  if (e.key === "3") { document.querySelector('[data-tab="recent30"]').click(); return; }

  if (e.key === "j" || e.key === "ArrowDown") {
    e.preventDefault();
    if (drawerOpen) drawerStep(1); else moveFocus(1);
    return;
  }
  if (e.key === "k" || e.key === "ArrowUp") {
    e.preventDefault();
    if (drawerOpen) drawerStep(-1); else moveFocus(-1);
    return;
  }
  if (e.key === "Enter" && !drawerOpen && state.focusIdx >= 0) {
    e.preventDefault();
    openDrawer(state.focusIdx);
    return;
  }
});

window.addEventListener("hashchange", () => {
  // Allow back/forward to drive state
  state.filters.types.clear(); state.filters.topics.clear();
  state.filters.search = ""; state.filters.tab = "all";
  readUrlState();
  document.getElementById("search").value = state.filters.search;
  document.querySelectorAll("nav.tabs button").forEach(b => b.classList.toggle("active", b.dataset.tab === state.filters.tab));
  applyLang();
  applyTheme();
  render();
  renderFacets();
  if (state._pendingEntry) {
    const idx = state.filtered.findIndex(e => e.id === state._pendingEntry);
    if (idx >= 0) openDrawer(idx); else closeDrawer();
    state._pendingEntry = null;
  } else if (state.drawerIdx >= 0) {
    closeDrawer();
  }
});

// Initial sync of search input from URL state
window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("search").value = state.filters.search || "";
  document.querySelectorAll("nav.tabs button").forEach(b => b.classList.toggle("active", b.dataset.tab === state.filters.tab));
});

load();
</script>
