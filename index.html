<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wi-Fi Knowledge Base</title>
<style>
  /* ---------- THEME ---------- */
  :root {
    --fg: #18181b;
    --fg-2: #52525b;
    --fg-3: #a1a1aa;
    --bg: #ffffff;
    --bg-2: #fafafa;
    --bg-3: #f4f4f5;
    --border: #e4e4e7;
    --border-strong: #d4d4d8;
    --accent: #b40000;
    --accent-2: #fdf3f3;
    --accent-fg: #ffffff;
    --link: #0e6dc2;
    --code-bg: #f4f4f5;
    --col-academia: #6c5ce7;
    --col-academia-bg: #f3f1fc;
    --col-industry: #00946d;
    --col-industry-bg: #effbf6;
    --col-standards: #b48a00;
    --col-standards-bg: #fdf8e7;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 4px 12px rgba(0, 0, 0, 0.06);
    --shadow-strong: 0 8px 32px rgba(0, 0, 0, 0.12);
    --radius: 6px;
    --header-h: 52px;
    --side-w: 220px;
    --col-gap: 16px;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", "JetBrains Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  [data-theme="dark"] {
    --fg: #f4f4f5;
    --fg-2: #a1a1aa;
    --fg-3: #71717a;
    --bg: #0c0c0e;
    --bg-2: #18181b;
    --bg-3: #27272a;
    --border: #27272a;
    --border-strong: #3f3f46;
    --accent: #ef4444;
    --accent-2: #1f1313;
    --accent-fg: #ffffff;
    --link: #60a5fa;
    --code-bg: #18181b;
    --col-academia: #a78bfa;
    --col-academia-bg: #1c1830;
    --col-industry: #34d399;
    --col-industry-bg: #0e1f1a;
    --col-standards: #fbbf24;
    --col-standards-bg: #1f1a0a;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 4px 12px rgba(0, 0, 0, 0.5);
    --shadow-strong: 0 8px 32px rgba(0, 0, 0, 0.7);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    font-size: 13.5px; line-height: 1.55;
    color: var(--fg); background: var(--bg);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body.lang-zh { font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { font: inherit; }
  ::selection { background: var(--accent); color: var(--accent-fg); }

  /* ---------- HEADER ---------- */
  header.app-header {
    height: var(--header-h);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 30;
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; font-weight: 600; }
  .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); display: inline-block; transform: translateY(-1px); }
  .brand h1 { font-size: 14px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
  .brand .stats { color: var(--fg-3); font-size: 12px; font-variant-numeric: tabular-nums; }
  .header-spacer { flex: 1; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn, .lang-toggle {
    background: transparent; border: 1px solid var(--border); color: var(--fg-2);
    height: 30px; padding: 0 10px; border-radius: var(--radius); cursor: pointer; font-size: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: border-color 0.1s, color 0.1s;
  }
  .icon-btn:hover, .lang-toggle:hover { color: var(--fg); border-color: var(--border-strong); }
  .lang-toggle { padding: 0; overflow: hidden; }
  .lang-toggle button {
    background: transparent; border: 0; color: var(--fg-2); height: 28px; padding: 0 10px; cursor: pointer; font-size: 12px;
  }
  .lang-toggle button.active { background: var(--fg); color: var(--bg); }
  [data-theme="dark"] .lang-toggle button.active { background: var(--accent); color: var(--accent-fg); }

  /* ---------- TABS ---------- */
  nav.tabs {
    display: flex; gap: 0; padding: 0 20px;
    border-bottom: 1px solid var(--border); background: var(--bg);
    position: sticky; top: var(--header-h); z-index: 20;
  }
  nav.tabs button {
    background: transparent; border: 0; height: 38px; padding: 0 14px; cursor: pointer;
    color: var(--fg-2); font-size: 13px; border-bottom: 2px solid transparent;
    margin-bottom: -1px; white-space: nowrap;
  }
  nav.tabs button:hover { color: var(--fg); }
  nav.tabs button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  nav.tabs .kbd-hint { margin-left: auto; padding: 0 4px; font-size: 11px; color: var(--fg-3); display: flex; align-items: center; gap: 4px; }
  kbd { font-family: var(--mono); font-size: 10.5px; background: var(--bg-3); color: var(--fg-2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; line-height: 1.4; }

  /* ---------- LAYOUT ---------- */
  main {
    display: grid;
    grid-template-columns: var(--side-w) 1fr;
    gap: 20px;
    padding: 16px 20px 60px;
    max-width: 1700px; margin: 0 auto;
    align-items: start;
  }

  /* ---------- SIDEBAR ---------- */
  aside.sidebar {
    position: sticky; top: calc(var(--header-h) + 38px + 1px);
    max-height: calc(100vh - var(--header-h) - 38px - 1px);
    overflow-y: auto; padding: 4px 0; font-size: 13px;
  }
  .search-wrap { position: relative; }
  .search {
    width: 100%; padding: 7px 32px 7px 30px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font: inherit; background: var(--bg-2); color: var(--fg); outline: none;
  }
  .search:focus { border-color: var(--accent); background: var(--bg); }
  .search-icon { position: absolute; left: 8px; top: 8px; color: var(--fg-3); pointer-events: none; }
  .search-kbd { position: absolute; right: 8px; top: 6px; pointer-events: none; }

  .facet-group { margin-top: 18px; }
  .facet-group h3 {
    margin: 0 0 6px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--fg-3); cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 4px;
  }
  .facet-group h3 .chev { transition: transform 0.15s; opacity: 0.5; }
  .facet-group.collapsed h3 .chev { transform: rotate(-90deg); }
  .facet-group.collapsed .facet-list { display: none; }
  .facet-list { display: flex; flex-direction: column; gap: 1px; }
  .facet-item {
    display: flex; align-items: center; gap: 8px; padding: 3px 6px; cursor: pointer;
    border-radius: 4px; color: var(--fg-2); transition: background 0.1s, color 0.1s;
  }
  .facet-item:hover { background: var(--bg-3); color: var(--fg); }
  .facet-item input { margin: 0; accent-color: var(--accent); }
  .facet-item .label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .facet-item .count { color: var(--fg-3); font-size: 11px; font-variant-numeric: tabular-nums; }
  .facet-item.checked .label { color: var(--fg); font-weight: 500; }
  .facet-clear { margin-top: 8px; padding: 0; background: transparent; border: 0; color: var(--fg-3); font-size: 12px; cursor: pointer; }
  .facet-clear:hover { color: var(--accent); }

  /* ---------- 3-COLUMN TIMELINE ---------- */
  section.results { min-width: 0; }
  .result-bar {
    display: flex; align-items: center; gap: 12px;
    color: var(--fg-3); font-size: 12px; padding: 0 0 10px;
    font-variant-numeric: tabular-nums;
  }
  .result-bar .applied { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; min-width: 0; }
  .applied .chip {
    background: var(--accent-2); color: var(--accent);
    padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500;
    cursor: pointer; border: 1px solid transparent;
  }
  .applied .chip:hover { border-color: var(--accent); }
  .applied .chip::after { content: " ×"; opacity: 0.6; }
  .link-btn {
    background: transparent; border: 0; color: var(--fg-3);
    font: inherit; font-size: 11px; cursor: pointer; padding: 2px 6px;
    text-decoration: underline; text-underline-offset: 2px;
  }
  .link-btn:hover { color: var(--accent); }

  .columns {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: var(--col-gap);
    align-items: start;
  }
  .column {
    min-width: 0; display: flex; flex-direction: column;
  }
  .col-head {
    position: sticky;
    top: calc(var(--header-h) + 38px + 1px);
    background: var(--bg); z-index: 10;
    padding: 4px 0 10px;
    border-bottom: 2px solid;
    margin-bottom: 12px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .col-head .name { font-weight: 700; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }
  .col-head .count { font-size: 11px; color: var(--fg-3); font-variant-numeric: tabular-nums; }
  .column[data-cat="academia"]  .col-head { border-color: var(--col-academia); }
  .column[data-cat="academia"]  .col-head .name { color: var(--col-academia); }
  .column[data-cat="industry"]  .col-head { border-color: var(--col-industry); }
  .column[data-cat="industry"]  .col-head .name { color: var(--col-industry); }
  .column[data-cat="standards"] .col-head { border-color: var(--col-standards); }
  .column[data-cat="standards"] .col-head .name { color: var(--col-standards); }

  /* Per-column sparkline of entries-per-month */
  .col-density {
    display: flex; align-items: flex-end; gap: 1px;
    height: 22px; padding: 0 0 4px;
    margin-bottom: 8px;
  }
  .col-density .bar {
    flex: 1; min-width: 4px; background: var(--bg-3);
    border-radius: 1px 1px 0 0;
    cursor: pointer; position: relative;
    transition: background 0.1s;
  }
  .col-density .bar:hover { background: var(--fg-3); }
  .col-density .bar.has-current { background: var(--bg-3); }
  .col-density .bar[data-cat="academia"]  { background: var(--col-academia); opacity: 0.55; }
  .col-density .bar[data-cat="industry"]  { background: var(--col-industry); opacity: 0.55; }
  .col-density .bar[data-cat="standards"] { background: var(--col-standards); opacity: 0.55; }
  .col-density .bar:hover { opacity: 1; }
  .col-density .bar .tooltip {
    display: none; position: absolute; bottom: calc(100% + 4px); left: 50%;
    transform: translateX(-50%); white-space: nowrap;
    background: var(--fg); color: var(--bg);
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    z-index: 5; pointer-events: none;
    font-variant-numeric: tabular-nums;
  }
  .col-density .bar:hover .tooltip { display: block; }

  .month-divider {
    font-size: 11px; font-weight: 600; color: var(--fg-3);
    letter-spacing: 0.05em; text-transform: uppercase;
    margin: 12px 0 6px; padding: 4px 0;
    border-top: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: calc(var(--header-h) + 38px + 1px + 60px);  /* below col-head */
    z-index: 8;
  }
  .month-divider:first-child { border-top: 0; padding-top: 0; margin-top: 0; }

  /* ---------- ENTRY CARDS (compact) ---------- */
  .entry-card {
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg);
    cursor: pointer;
    margin-bottom: 8px;
    transition: border-color 0.1s, background 0.1s;
    position: relative;
    display: grid;
    grid-template-columns: 4px 1fr;   /* color stripe | content (carousel + text) */
    overflow: hidden;
  }
  .entry-card:hover { border-color: var(--border-strong); background: var(--bg-2); }
  .entry-card.focused { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-2); }
  .entry-card .stripe { background: var(--bg-3); }
  .entry-card[data-cat="academia"]  .stripe { background: var(--col-academia); }
  .entry-card[data-cat="industry"]  .stripe { background: var(--col-industry); }
  .entry-card[data-cat="standards"] .stripe { background: var(--col-standards); }
  .entry-card .content { min-width: 0; }
  .entry-card .text { padding: 10px 12px; }

  /* Image carousel above the text */
  .entry-card .carousel {
    position: relative;
    width: 100%; aspect-ratio: 16 / 7;
    background: var(--bg-3);
    overflow: hidden;
    border-bottom: 1px solid var(--border);
  }
  .entry-card .carousel-track {
    display: flex; height: 100%;
    transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    will-change: transform;
  }
  .entry-card .carousel-slide {
    flex: 0 0 100%; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-3);
  }
  .entry-card .carousel-slide img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .entry-card .carousel-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 28px; height: 28px;
    background: rgba(0, 0, 0, 0.55); color: #fff;
    border: 0; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
    z-index: 2;
  }
  .entry-card:hover .carousel-btn { opacity: 1; }
  .entry-card .carousel-btn:hover { background: rgba(0, 0, 0, 0.75); }
  .entry-card .carousel-btn.prev { left: 6px; }
  .entry-card .carousel-btn.next { right: 6px; }
  .entry-card .carousel-btn svg { width: 14px; height: 14px; pointer-events: none; }
  .entry-card .carousel-dots {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; z-index: 2;
  }
  .entry-card .carousel-dots .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    cursor: pointer; padding: 0; border: 0;
    transition: background 0.1s;
  }
  .entry-card .carousel-dots .dot.active { background: rgba(255, 255, 255, 0.95); }
  .entry-card .carousel-dots .dot:hover { background: rgba(255, 255, 255, 0.85); }
  .entry-card.read .title { color: var(--fg-2); font-weight: 500; }
  .entry-card.unread .pub-date::before {
    content: "•"; color: var(--accent); margin-right: 4px;
    font-size: 14px; line-height: 0; vertical-align: middle;
  }
  .entry-card .top-row {
    display: flex; align-items: baseline; gap: 6px;
    margin-bottom: 3px;
  }
  .entry-card .pub-date {
    font-size: 11px; color: var(--fg-3); font-variant-numeric: tabular-nums;
    font-family: var(--mono);
    white-space: nowrap;
  }
  .entry-card .type-label {
    font-size: 10px; font-family: var(--mono);
    text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--fg-3);
  }
  .entry-card[data-cat="academia"]  .type-label { color: var(--col-academia); }
  .entry-card[data-cat="industry"]  .type-label { color: var(--col-industry); }
  .entry-card[data-cat="standards"] .type-label { color: var(--col-standards); }
  .entry-card .title {
    font-weight: 600; font-size: 13.5px; line-height: 1.4; color: var(--fg);
    margin: 0 0 4px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .entry-card .summary {
    font-size: 12px; line-height: 1.45; color: var(--fg-2);
    margin: 0 0 5px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .entry-card .meta { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; margin: 0; }
  .pill {
    display: inline-flex; align-items: center; height: 17px; padding: 0 6px; border-radius: 3px;
    font-size: 10.5px; font-family: var(--mono);
    background: var(--bg-3); color: var(--fg-2); border: 1px solid var(--border);
    line-height: 1; white-space: nowrap;
  }
  .pill.type {
    text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px; background: transparent;
  }
  .column[data-cat="academia"]  .pill.type { color: var(--col-academia); border-color: var(--col-academia); }
  .column[data-cat="industry"]  .pill.type { color: var(--col-industry); border-color: var(--col-industry); }
  .column[data-cat="standards"] .pill.type { color: var(--col-standards); border-color: var(--col-standards); }
  .pill.topic { background: var(--bg-3); }
  .pill.topic.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  .novelty { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: var(--fg-3); }
  .novelty-bar { display: inline-flex; gap: 2px; height: 7px; }
  .novelty-bar i { width: 5px; background: var(--bg-3); border-radius: 1px; display: inline-block; }
  .novelty-bar i.on { background: var(--accent); }

  .empty-col {
    text-align: center; padding: 40px 12px; color: var(--fg-3); font-size: 12px;
    border: 1px dashed var(--border); border-radius: var(--radius);
  }
  .empty-state { text-align: center; padding: 80px 20px; color: var(--fg-3); font-size: 14px; }
  .empty-state code { background: var(--bg-3); padding: 2px 6px; border-radius: 3px; font-family: var(--mono); font-size: 12px; }

  /* ---------- DRAWER (unchanged) ---------- */
  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0); pointer-events: none;
    transition: background 0.2s ease; z-index: 40;
  }
  .drawer-overlay.open { background: rgba(0, 0, 0, 0.18); pointer-events: auto; }
  [data-theme="dark"] .drawer-overlay.open { background: rgba(0, 0, 0, 0.55); }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(720px, 100%);
    background: var(--bg); border-left: 1px solid var(--border); box-shadow: var(--shadow-strong);
    transform: translateX(100%); transition: transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
    z-index: 50; display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    height: var(--header-h); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; padding: 0 12px 0 16px; background: var(--bg); flex-shrink: 0;
  }
  .drawer-head .pos { color: var(--fg-3); font-size: 12px; font-variant-numeric: tabular-nums; margin-right: auto; }
  .drawer-body { overflow-y: auto; padding: 28px 36px 80px; scroll-behavior: smooth; }
  .drawer-body h2.entry-title { margin: 0 0 8px; font-size: 22px; font-weight: 700; line-height: 1.25; letter-spacing: -0.01em; color: var(--fg); }
  .drawer-body .meta-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 0 0 24px; font-size: 12px; }
  .drawer-body .meta-row .date { color: var(--fg-2); font-variant-numeric: tabular-nums; }
  .drawer-body .body-html { font-size: 14.5px; line-height: 1.65; color: var(--fg); max-width: 720px; }
  .drawer-body .body-html h3 {
    margin: 28px 0 10px; font-size: 14px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em; color: var(--fg-2);
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .drawer-body .body-html h3:first-child { margin-top: 0; }
  .drawer-body .body-html h4 { margin: 20px 0 8px; font-size: 14px; font-weight: 600; }
  .drawer-body .body-html p { margin: 0 0 14px; }
  .drawer-body .body-html ul { margin: 0 0 14px; padding-left: 22px; }
  .drawer-body .body-html li { margin-bottom: 4px; }
  .drawer-body .body-html code { font-family: var(--mono); font-size: 0.86em; background: var(--code-bg); padding: 1px 5px; border-radius: 3px; color: var(--fg); }
  .drawer-body .body-html strong { color: var(--fg); font-weight: 600; }
  .drawer-body .body-html em { color: var(--fg); }
  .drawer-body .images-block { margin: 28px 0; display: flex; flex-direction: column; gap: 18px; }
  .drawer-body .images-block figure {
    margin: 0; border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; background: var(--bg-2);
  }
  .drawer-body .images-block img { display: block; width: 100%; height: auto; background: var(--bg-2); }
  .drawer-body .images-block figcaption {
    padding: 10px 14px; font-size: 12.5px; color: var(--fg-2); border-top: 1px solid var(--border);
  }
  .drawer-foot {
    border-top: 1px solid var(--border); background: var(--bg);
    padding: 12px 24px; display: flex; gap: 12px; flex-shrink: 0; font-size: 13px;
  }
  .drawer-foot .btn {
    background: var(--bg-2); border: 1px solid var(--border); color: var(--fg-2);
    padding: 7px 14px; border-radius: var(--radius); cursor: pointer; text-decoration: none;
    transition: border-color 0.1s, color 0.1s;
  }
  .drawer-foot .btn:hover { color: var(--fg); border-color: var(--border-strong); text-decoration: none; }
  .drawer-foot .btn.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  .drawer-foot .btn.primary:hover { color: var(--accent-fg); }
  .drawer-foot .spacer { flex: 1; }

  .help-modal { position: fixed; inset: 0; z-index: 60; background: rgba(0, 0, 0, 0.4); display: none; align-items: center; justify-content: center; }
  .help-modal.open { display: flex; }
  .help-modal .panel {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 24px 28px;
    max-width: 460px; width: calc(100% - 32px); box-shadow: var(--shadow-strong);
  }
  .help-modal h2 { margin: 0 0 16px; font-size: 16px; }
  .help-modal table { border-collapse: collapse; width: 100%; }
  .help-modal td { padding: 5px 0; font-size: 13px; }
  .help-modal td:first-child { width: 110px; }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 1100px) {
    main { grid-template-columns: 1fr; }
    aside.sidebar { position: static; max-height: none; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }

</style>
</head>
<body>

<script>
const I18N = {
  en: {
    title: "Wi-Fi Knowledge Base",
    search_placeholder: "Search title, summary, topics…",
    group_standards: "Standards",
    group_layers: "Layers",
    group_features: "Features",
    group_themes: "Themes",
    group_market: "Market",
    group_other: "Other topics",
    col_academia: "Academia",
    col_industry: "Industry",
    col_standards: "Standards",
    tab_all: "All",
    tab_recent: "Last 7 days",
    tab_recent30: "Last 30 days",
    tab_recent365: "Last 12 months",
    of_n: (n, total) => `${n} of ${total}`,
    no_match: "Nothing matches the current filters.",
    no_match_col: "(none)",
    last_updated: "updated",
    entries_label: "entries",
    open_original: "Read original ↗",
    open_source: "Source on GitHub",
    copy_citation: "Copy citation",
    copied: "Copied!",
    pos: (i, n) => `${i + 1} / ${n}`,
    novelty: "novelty",
    facet_clear: "Clear filters",
    mark_all_read: "Mark all read",
    help_title: "Keyboard shortcuts",
    month_label: (y, m) => `${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][m-1]} ${y}`,
    load_error: (msg) => `No <code>kb.json</code> yet, or <code>kb.js</code> failed (${msg}). Run <code>python scripts/rebuild_index.py</code> to regenerate.`,
  },
  zh: {
    title: "Wi-Fi 知识库",
    search_placeholder: "搜索标题、摘要、标签…",
    group_standards: "标准",
    group_layers: "协议层",
    group_features: "特性",
    group_themes: "主题",
    group_market: "市场",
    group_other: "其他标签",
    col_academia: "学术",
    col_industry: "产业",
    col_standards: "标准",
    tab_all: "全部",
    tab_recent: "最近 7 天",
    tab_recent30: "最近 30 天",
    tab_recent365: "最近 12 个月",
    of_n: (n, total) => `共 ${total} · 命中 ${n}`,
    no_match: "当前筛选条件下没有条目。",
    no_match_col: "（无）",
    last_updated: "更新于",
    entries_label: "条",
    open_original: "查看原文 ↗",
    open_source: "GitHub 源文件",
    copy_citation: "复制引用",
    copied: "已复制！",
    pos: (i, n) => `${i + 1} / ${n}`,
    novelty: "新颖度",
    facet_clear: "清除筛选",
    mark_all_read: "全部标为已读",
    help_title: "键盘快捷键",
    month_label: (y, m) => `${y} 年 ${m} 月`,
    load_error: (msg) => `尚无 <code>kb.json</code>，或 <code>kb.js</code> 加载失败（${msg}）。请运行 <code>python scripts/rebuild_index.py</code> 重建。`,
  },
};

const SHORTCUTS = [
  ["/", "Focus search", "聚焦搜索"],
  ["j / ↓", "Next entry", "下一条"],
  ["k / ↑", "Previous entry", "上一条"],
  ["Enter", "Open entry", "打开条目"],
  ["Esc", "Close drawer / blur search", "关闭抽屉 / 取消搜索"],
  ["1 2 3 4", "Switch tab", "切换标签页"],
  ["t", "Toggle theme", "切换主题"],
  ["l", "Toggle language", "切换语言"],
  ["g", "Jump to source URL", "跳转到原文"],
  ["?", "Show this help", "显示帮助"],
];

const TOPIC_GROUPS = {
  standards: ["802.11a","802.11b","802.11g","802.11n","802.11ac","802.11ax","802.11be","802.11bn","802.11bf","802.11bq","802.11ba","802.11az"],
  layers: ["MAC-layer","PHY-layer","APP-layer"],
  features: ["MLO","MAPC","R-TWT","TWT","OFDMA","EDCA","MU-MIMO","spatial-reuse","ELR-PPDU","UEQM"],
  themes: ["WiFi-sensing","agentic-AI","generative-AI","roaming","scheduling","security","power-save"],
  market: ["IoT","XR","products","automotive","industrial"],
};
function topicGroup(t) {
  for (const [g, list] of Object.entries(TOPIC_GROUPS)) if (list.includes(t)) return g;
  return "other";
}

const CATEGORIES = ["academia", "industry", "standards"];

let state = {
  data: null,
  entries: [],
  topicCounts: {},
  filtered: [],
  filters: {
    tab: "all", search: "",
    topics: new Set(),
  },
  lang: localStorage.getItem("kb_lang") || "en",
  theme: localStorage.getItem("kb_theme") || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"),
  readSet: new Set(JSON.parse(localStorage.getItem("kb_read") || "[]")),
  drawerIdx: -1,
  focusIdx: -1,
};

function markRead(entryId) {
  if (!entryId) return;
  state.readSet.add(entryId);
  localStorage.setItem("kb_read", JSON.stringify([...state.readSet]));
}
function markAllRead() {
  state.entries.forEach(e => state.readSet.add(e.id));
  localStorage.setItem("kb_read", JSON.stringify([...state.readSet]));
  render();
}
function clearRead() {
  state.readSet.clear();
  localStorage.removeItem("kb_read");
  render();
}

function t() { return I18N[state.lang]; }

function readUrlState() {
  const h = location.hash.replace(/^#/, "");
  if (!h) return;
  const params = new URLSearchParams(h);
  if (params.has("tab")) state.filters.tab = params.get("tab");
  if (params.has("q")) state.filters.search = params.get("q");
  if (params.has("topics")) state.filters.topics = new Set(params.get("topics").split(",").filter(Boolean));
  if (params.has("lang")) state.lang = params.get("lang");
  if (params.has("entry")) state._pendingEntry = params.get("entry");
}
function writeUrlState() {
  const p = new URLSearchParams();
  if (state.filters.tab !== "all") p.set("tab", state.filters.tab);
  if (state.filters.search) p.set("q", state.filters.search);
  if (state.filters.topics.size) p.set("topics", [...state.filters.topics].join(","));
  if (state.lang !== "en") p.set("lang", state.lang);
  if (state.drawerIdx >= 0 && state.filtered[state.drawerIdx]) p.set("entry", state.filtered[state.drawerIdx].id);
  const hash = p.toString();
  history.replaceState(null, "", hash ? "#" + hash : location.pathname);
}

function applyLang() {
  document.documentElement.lang = state.lang === "zh" ? "zh" : "en";
  document.body.classList.toggle("lang-zh", state.lang === "zh");
  const labels = t();
  document.title = labels.title;
  document.getElementById("header-title").textContent = labels.title;
  document.getElementById("search").placeholder = labels.search_placeholder;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const k = el.getAttribute("data-i18n");
    if (labels[k]) el.textContent = labels[k];
  });
  const tabBtns = document.querySelectorAll("nav.tabs button");
  tabBtns[0].textContent = labels.tab_all;
  tabBtns[1].textContent = labels.tab_recent;
  tabBtns[2].textContent = labels.tab_recent30;
  tabBtns[3].textContent = labels.tab_recent365;
  document.querySelectorAll("#lang-toggle button").forEach(b => b.classList.toggle("active", b.dataset.lang === state.lang));
  document.getElementById("facet-clear").textContent = labels.facet_clear;
  document.getElementById("drawer-original").textContent = labels.open_original;
  document.getElementById("drawer-source").textContent = labels.open_source;
  document.getElementById("drawer-copy").textContent = labels.copy_citation;
  const ht = document.getElementById("help-table");
  ht.innerHTML = SHORTCUTS.map(([k, en, zh]) =>
    `<tr><td><kbd>${k.replace(/ /g, "</kbd> <kbd>")}</kbd></td><td>${state.lang === "zh" ? zh : en}</td></tr>`
  ).join("");
}

function applyTheme() {
  document.documentElement.setAttribute("data-theme", state.theme);
  const dark = state.theme === "dark";
  const icon = document.getElementById("theme-icon");
  icon.innerHTML = dark
    ? '<circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/>'
    : '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/>';
}

async function load() {
  applyTheme();
  readUrlState();
  applyLang();
  try {
    let data;
    if (window.KB_DATA && Array.isArray(window.KB_DATA.entries)) data = window.KB_DATA;
    else {
      const r = await fetch("kb.json", { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      data = await r.json();
    }
    state.data = data;
    state.entries = data.entries || [];
    state.topicCounts = data.topic_counts || {};
    document.getElementById("stats").textContent =
      `${state.entries.length} ${t().entries_label} · ${t().last_updated} ${data.last_updated || "—"}`;
    renderFacets();
    render();
    if (state._pendingEntry) {
      const idx = state.filtered.findIndex(e => e.id === state._pendingEntry);
      if (idx >= 0) openDrawer(idx);
      state._pendingEntry = null;
    }
  } catch (err) {
    document.getElementById("stats").textContent = "—";
    document.getElementById("columns").style.display = "none";
    document.getElementById("col-academia").parentElement.parentElement.insertAdjacentHTML(
      "beforebegin", `<div class="empty-state">${t().load_error(err.message)}</div>`);
  }
}

function renderFacets() {
  const buckets = { standards: [], layers: [], features: [], themes: [], market: [], other: [] };
  for (const [tg, n] of Object.entries(state.topicCounts)) buckets[topicGroup(tg)].push([tg, n]);
  for (const [grp, items] of Object.entries(buckets)) {
    items.sort((a,b) => b[1]-a[1]);
    const el = document.getElementById("facet-" + grp);
    if (!el) continue;
    if (!items.length) { el.parentElement.style.display = "none"; }
    else {
      el.parentElement.style.display = "";
      el.innerHTML = items.map(([name, count]) => {
        const checked = state.filters.topics.has(name);
        return `<label class="facet-item${checked ? " checked" : ""}">
          <input type="checkbox" data-facet="topic" data-value="${escAttr(name)}"${checked ? " checked" : ""}>
          <span class="label">${escHTML(name)}</span><span class="count">${count}</span>
        </label>`;
      }).join("");
    }
  }
  document.querySelectorAll('[data-facet]').forEach(el => {
    el.addEventListener("change", e => {
      const v = e.target.dataset.value;
      if (e.target.checked) state.filters.topics.add(v); else state.filters.topics.delete(v);
      render(); writeUrlState();
    });
  });
  document.querySelectorAll(".facet-group h3").forEach(h => {
    h.addEventListener("click", () => h.parentElement.classList.toggle("collapsed"));
  });
}

function entryMatches(e) {
  const f = state.filters;
  const date = e.date_published || e.date_found;
  if (f.tab === "recent") {
    const c = new Date(); c.setDate(c.getDate()-7);
    if (new Date(date) < c) return false;
  } else if (f.tab === "recent30") {
    const c = new Date(); c.setDate(c.getDate()-30);
    if (new Date(date) < c) return false;
  } else if (f.tab === "recent365") {
    const c = new Date(); c.setDate(c.getDate()-365);
    if (new Date(date) < c) return false;
  }
  if (f.topics.size && !(e.topics || []).some(tg => f.topics.has(tg))) return false;
  if (f.search) {
    const q = f.search.toLowerCase();
    const hay = (e.search_blob || [e.title_en, e.title_zh, (e.topics||[]).join(" "), e.summary_short_en, e.summary_short_zh].join(" ")).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function pickLang(e, field) {
  const k = field + "_" + state.lang;
  return e[k] || e[field + "_" + (state.lang === "en" ? "zh" : "en")] || "";
}

function buildDensityHTML(items, cat) {
  // Bucket items by month over the last 12 months. items = [{e, idx}, ...]
  const now = new Date();
  const buckets = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const yy = d.getFullYear(), mm = d.getMonth() + 1;
    buckets.push({ key: `${yy}-${String(mm).padStart(2,"0")}`, year: yy, month: mm, count: 0 });
  }
  const idx = Object.fromEntries(buckets.map((b, i) => [b.key, i]));
  for (const { e } of items) {
    const date = e.date_published || e.date_found;
    if (!date) continue;
    const [yy, mm] = date.split("-");
    const k = `${yy}-${mm}`;
    if (k in idx) buckets[idx[k]].count++;
  }
  const max = Math.max(1, ...buckets.map(b => b.count));
  return `<div class="col-density" data-cat="${cat}">${
    buckets.map(b => {
      const h = Math.max(2, Math.round((b.count / max) * 22));
      const tip = `${t().month_label(b.year, b.month)} · ${b.count}`;
      return `<div class="bar" data-cat="${cat}" data-month-key="${b.key}" style="height:${h}px"><span class="tooltip">${tip}</span></div>`;
    }).join("")
  }</div>`;
}

function render() {
  state.filtered = state.entries.filter(entryMatches);
  document.getElementById("result-count").textContent = t().of_n(state.filtered.length, state.entries.length);
  renderAppliedChips();
  document.getElementById("facet-clear").hidden = !(state.filters.topics.size || state.filters.search);

  // Group by category, then by month
  const byCat = { academia: [], industry: [], standards: [] };
  state.filtered.forEach((e, idx) => byCat[e.category]?.push({ e, idx }));
  for (const cat of CATEGORIES) {
    const target = document.getElementById("col-" + cat);
    document.getElementById("count-" + cat).textContent = byCat[cat].length;
    if (!byCat[cat].length) {
      target.innerHTML = `<div class="empty-col">${t().no_match_col}</div>`;
      continue;
    }
    const density = buildDensityHTML(byCat[cat], cat);
    let lastMonthKey = null;
    const cardsHtml = byCat[cat].map(({ e, idx }) => {
      const date = e.date_published || e.date_found;
      const [yy, mm] = date.split("-");
      const monthKey = yy + "-" + mm;
      let divider = "";
      if (monthKey !== lastMonthKey) {
        divider = `<div class="month-divider" data-month-key="${monthKey}">${t().month_label(parseInt(yy,10), parseInt(mm,10))}</div>`;
        lastMonthKey = monthKey;
      }
      return divider + cardHTML(e, idx);
    }).join("");
    target.innerHTML = density + cardsHtml;
  }
  bindCards();
  bindDensityBars();
  applyFocus();
}

function bindDensityBars() {
  document.querySelectorAll(".col-density .bar").forEach(bar => {
    bar.addEventListener("click", () => {
      const k = bar.dataset.monthKey;
      const cat = bar.dataset.cat;
      const target = document.querySelector(`#col-${cat} .month-divider[data-month-key="${k}"]`);
      if (target) target.scrollIntoView({ block: "start", behavior: "smooth" });
    });
  });
}

function renderAppliedChips() {
  const c = document.getElementById("applied-chips");
  const chips = [];
  if (state.filters.search) chips.push({ kind: "search", value: state.filters.search, label: `“${state.filters.search}”` });
  state.filters.topics.forEach(v => chips.push({ kind: "topic", value: v, label: v }));
  c.innerHTML = chips.map(ch =>
    `<span class="chip" data-kind="${ch.kind}" data-value="${escAttr(ch.value)}">${escHTML(ch.label)}</span>`
  ).join("");
  c.querySelectorAll(".chip").forEach(el => {
    el.addEventListener("click", () => {
      const { kind, value } = el.dataset;
      if (kind === "search") { state.filters.search = ""; document.getElementById("search").value = ""; }
      else if (kind === "topic") state.filters.topics.delete(value);
      render(); renderFacets(); writeUrlState();
    });
  });
}

function relativeDate(iso) {
  // Returns "3d ago" / "May 1" / "Apr 2025" depending on age.
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  const now = new Date();
  const ms = now - d;
  const day = 24 * 60 * 60 * 1000;
  const days = Math.floor(ms / day);
  if (days < 1)  return state.lang === "zh" ? "今天" : "today";
  if (days < 7)  return state.lang === "zh" ? `${days} 天前` : `${days}d ago`;
  if (days < 30) return state.lang === "zh" ? `${Math.floor(days/7)} 周前` : `${Math.floor(days/7)}w ago`;
  // Same calendar year → short month + day
  const monthsEn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const yyyy = d.getFullYear(), mm = d.getMonth() + 1, dd = d.getDate();
  if (yyyy === now.getFullYear()) {
    return state.lang === "zh" ? `${mm} 月 ${dd} 日` : `${monthsEn[mm-1]} ${dd}`;
  }
  return state.lang === "zh" ? `${yyyy} 年 ${mm} 月` : `${monthsEn[mm-1]} ${yyyy}`;
}

function carouselHTML(images) {
  if (!images || !images.length) return "";
  const slides = images.map((im, i) =>
    `<div class="carousel-slide"><img src="${escAttr(im.url)}" alt="" loading="lazy" onerror="this.closest('.carousel-slide').style.display='none'"></div>`
  ).join("");
  const dots = images.length > 1
    ? `<div class="carousel-dots" data-stop>${
        images.map((_, i) =>
          `<button class="dot${i === 0 ? " active" : ""}" data-go="${i}" data-stop aria-label="Image ${i+1}"></button>`
        ).join("")
      }</div>`
    : "";
  const buttons = images.length > 1
    ? `<button class="carousel-btn prev" data-step="-1" data-stop aria-label="Previous image">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
       </button>
       <button class="carousel-btn next" data-step="1" data-stop aria-label="Next image">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
       </button>`
    : "";
  return `<div class="carousel" data-count="${images.length}" data-pos="0">
    <div class="carousel-track">${slides}</div>
    ${buttons}${dots}
  </div>`;
}

function cardHTML(e, idx) {
  const title = pickLang(e, "title");
  const summary = pickLang(e, "summary_short");
  const novelty = e.novelty_score || 0;
  const noveltyHTML = `<span class="novelty"><span class="novelty-bar">${[1,2,3,4,5].map(n => `<i${n<=novelty?' class="on"':''}></i>`).join("")}</span></span>`;
  const topicsHTML = (e.topics || []).slice(0, 5).map(tg => {
    const active = state.filters.topics.has(tg) ? " active" : "";
    return `<span class="pill topic${active}" data-topic="${escAttr(tg)}">${escHTML(tg)}</span>`;
  }).join("");
  const overflow = (e.topics || []).length > 5 ? `<span class="pill" title="${escAttr((e.topics || []).slice(5).join(", "))}">+${(e.topics || []).length - 5}</span>` : "";
  const date = e.date_published || e.date_found;
  const dateLabel = relativeDate(date);
  const dateTitle = ` title="${escAttr(date)}"`;
  const isRead = state.readSet.has(e.id);
  const cls = isRead ? "read" : "unread";
  const cat = e.category || "industry";
  return `<article class="entry-card ${cls}" data-idx="${idx}" data-cat="${escAttr(cat)}">
    <div class="stripe"></div>
    <div class="content">
      ${carouselHTML(e.images)}
      <div class="text">
        <div class="top-row">
          <span class="pub-date"${dateTitle}>${dateLabel}</span>
          <span class="type-label">${escHTML(e.type || "")}</span>
        </div>
        <div class="title">${escHTML(title)}</div>
        ${summary ? `<div class="summary">${escHTML(summary)}</div>` : ""}
        <div class="meta">
          ${noveltyHTML}
          ${topicsHTML}${overflow}
        </div>
      </div>
    </div>
  </article>`;
}

function carouselGoto(carousel, pos) {
  const total = parseInt(carousel.dataset.count, 10) || 1;
  const next = ((pos % total) + total) % total;
  carousel.dataset.pos = String(next);
  const track = carousel.querySelector(".carousel-track");
  if (track) track.style.transform = `translateX(-${next * 100}%)`;
  carousel.querySelectorAll(".carousel-dots .dot").forEach((d, i) => {
    d.classList.toggle("active", i === next);
  });
}

function bindCards() {
  document.querySelectorAll(".entry-card").forEach(card => {
    card.addEventListener("click", e => {
      // Carousel arrow / dot clicks: don't open the drawer
      const stopEl = e.target.closest("[data-stop]");
      if (stopEl) {
        const carousel = stopEl.closest(".carousel");
        if (!carousel) return;
        e.stopPropagation();
        if (stopEl.dataset.step) {
          const step = parseInt(stopEl.dataset.step, 10);
          const cur = parseInt(carousel.dataset.pos || "0", 10);
          carouselGoto(carousel, cur + step);
        } else if (stopEl.dataset.go) {
          carouselGoto(carousel, parseInt(stopEl.dataset.go, 10));
        }
        return;
      }
      const topicEl = e.target.closest("[data-topic]");
      if (topicEl) {
        const tg = topicEl.dataset.topic;
        if (state.filters.topics.has(tg)) state.filters.topics.delete(tg);
        else state.filters.topics.add(tg);
        render(); renderFacets(); writeUrlState();
        return;
      }
      openDrawer(parseInt(card.dataset.idx, 10));
    });
  });
}

function openDrawer(idx) {
  if (idx < 0 || idx >= state.filtered.length) return;
  state.drawerIdx = idx; state.focusIdx = idx;
  const e = state.filtered[idx];
  if (e && !state.readSet.has(e.id)) {
    markRead(e.id);
    // Update the open card's class without a full re-render so the position is preserved.
    const card = document.querySelector(`.entry-card[data-idx="${idx}"]`);
    if (card) { card.classList.remove("unread"); card.classList.add("read"); }
  }
  renderDrawer();
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawer-overlay").classList.add("open");
  document.getElementById("drawer").setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
  writeUrlState();
  applyFocus();
}
function closeDrawer() {
  state.drawerIdx = -1;
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawer-overlay").classList.remove("open");
  document.getElementById("drawer").setAttribute("aria-hidden", "true");
  document.body.style.overflow = "";
  writeUrlState();
}
function drawerStep(delta) {
  if (state.drawerIdx < 0) return;
  const next = state.drawerIdx + delta;
  if (next < 0 || next >= state.filtered.length) return;
  state.drawerIdx = next; state.focusIdx = next;
  const e = state.filtered[next];
  if (e && !state.readSet.has(e.id)) {
    markRead(e.id);
    const card = document.querySelector(`.entry-card[data-idx="${next}"]`);
    if (card) { card.classList.remove("unread"); card.classList.add("read"); }
  }
  renderDrawer();
  document.getElementById("drawer-body").scrollTop = 0;
  writeUrlState(); applyFocus();
}
function renderDrawer() {
  const e = state.filtered[state.drawerIdx];
  if (!e) return;
  const title = pickLang(e, "title");
  const bodyHTML = e["body_html_" + state.lang] || e["body_html_" + (state.lang === "en" ? "zh" : "en")] || "";
  const novelty = e.novelty_score || 0;
  const noveltyBar = `<span class="novelty"><span class="novelty-bar">${[1,2,3,4,5].map(n=>`<i${n<=novelty?' class="on"':''}></i>`).join("")}</span><span style="margin-left:6px">${t().novelty} ${novelty}/5</span></span>`;
  const topics = (e.topics || []).map(tg => `<span class="pill topic">${escHTML(tg)}</span>`).join("");
  const captionKey = state.lang === "zh" ? "caption_zh" : "caption_en";
  const imagesHTML = !(e.images && e.images.length) ? "" :
    `<div class="images-block">${e.images.map(im =>
      `<figure>
        <a href="${escAttr(im.url)}" target="_blank" rel="noopener"><img src="${escAttr(im.url)}" alt="${escAttr(im[captionKey] || "")}" loading="lazy"></a>
        ${im[captionKey] ? `<figcaption>${escHTML(im[captionKey])}</figcaption>` : ""}
      </figure>`).join("")}</div>`;
  const date = e.date_published || e.date_found;
  document.getElementById("drawer-body").innerHTML = `
    <h2 class="entry-title">${escHTML(title)}</h2>
    <div class="meta-row">
      <span class="date">${date}</span>
      <span class="pill type">${escHTML(e.type || "")}</span>
      ${noveltyBar}
      ${topics}
    </div>
    <div class="body-html">${bodyHTML}</div>
    ${imagesHTML}`;
  document.getElementById("drawer-pos").textContent = t().pos(state.drawerIdx, state.filtered.length);
  const orig = document.getElementById("drawer-original");
  orig.href = e.url || "#";
  orig.style.display = e.url ? "" : "none";
  const src = document.getElementById("drawer-source");
  src.href = "https://github.com/ntutangyun/wifi_knowledge_base/blob/main/" + (e.entry_path || "");
}

function applyFocus() {
  document.querySelectorAll(".entry-card").forEach(c => {
    const idx = parseInt(c.dataset.idx, 10);
    c.classList.toggle("focused", idx === state.focusIdx);
  });
  if (state.focusIdx >= 0) {
    const el = document.querySelector(`.entry-card[data-idx="${state.focusIdx}"]`);
    if (el) el.scrollIntoView({ block: "nearest", behavior: "smooth" });
  }
}
function moveFocus(delta) {
  const n = state.filtered.length;
  if (!n) return;
  if (state.focusIdx < 0) state.focusIdx = 0;
  else state.focusIdx = Math.max(0, Math.min(n-1, state.focusIdx + delta));
  applyFocus();
}

function escHTML(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escAttr(s) { return escHTML(s); }

function copyCitation() {
  const e = state.filtered[state.drawerIdx];
  if (!e) return;
  const title = pickLang(e, "title");
  const date = e.date_published || e.date_found;
  const txt = `${title}. ${date}. ${e.url || ""}`;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById("drawer-copy");
    const orig = btn.textContent;
    btn.textContent = t().copied;
    setTimeout(() => { btn.textContent = orig; }, 1500);
  });
}

document.querySelectorAll("nav.tabs button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("nav.tabs button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.filters.tab = btn.dataset.tab;
    state.focusIdx = -1;
    render(); writeUrlState();
  });
});
document.getElementById("search").addEventListener("input", e => {
  state.filters.search = e.target.value;
  state.focusIdx = -1;
  render(); writeUrlState();
});
document.querySelectorAll("#lang-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    state.lang = btn.dataset.lang;
    localStorage.setItem("kb_lang", state.lang);
    applyLang();
    if (state.entries.length) {
      document.getElementById("stats").textContent =
        `${state.entries.length} ${t().entries_label} · ${t().last_updated} ${state.data.last_updated || "—"}`;
      render();
      if (state.drawerIdx >= 0) renderDrawer();
    }
    writeUrlState();
  });
});
document.getElementById("theme-btn").addEventListener("click", () => {
  state.theme = state.theme === "dark" ? "light" : "dark";
  localStorage.setItem("kb_theme", state.theme);
  applyTheme();
});
document.getElementById("drawer-close").addEventListener("click", closeDrawer);
document.getElementById("drawer-overlay").addEventListener("click", closeDrawer);
document.getElementById("drawer-prev").addEventListener("click", () => drawerStep(-1));
document.getElementById("drawer-next").addEventListener("click", () => drawerStep(1));
document.getElementById("drawer-copy").addEventListener("click", copyCitation);
document.getElementById("facet-clear").addEventListener("click", () => {
  state.filters.topics.clear(); state.filters.search = "";
  document.getElementById("search").value = "";
  render(); renderFacets(); writeUrlState();
});
document.getElementById("mark-all-read").addEventListener("click", (ev) => {
  // Click = mark all read; Shift+Click = clear all read state
  if (ev.shiftKey) clearRead(); else markAllRead();
});
document.getElementById("help-btn").addEventListener("click", () => document.getElementById("help-modal").classList.add("open"));
document.getElementById("help-close").addEventListener("click", () => document.getElementById("help-modal").classList.remove("open"));
document.getElementById("help-modal").addEventListener("click", e => { if (e.target.id === "help-modal") e.currentTarget.classList.remove("open"); });

window.addEventListener("keydown", e => {
  const inField = e.target.matches("input, textarea, [contenteditable]");
  const drawerOpen = state.drawerIdx >= 0;
  if (e.key === "Escape") {
    if (document.getElementById("help-modal").classList.contains("open")) { document.getElementById("help-modal").classList.remove("open"); return; }
    if (drawerOpen) { closeDrawer(); return; }
    if (inField) { e.target.blur(); return; }
  }
  if (inField) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === "/") { e.preventDefault(); document.getElementById("search").focus(); return; }
  if (e.key === "?") { document.getElementById("help-modal").classList.add("open"); return; }
  if (e.key === "t") { document.getElementById("theme-btn").click(); return; }
  if (e.key === "l") {
    const next = state.lang === "en" ? "zh" : "en";
    document.querySelector(`#lang-toggle button[data-lang="${next}"]`).click();
    return;
  }
  if (e.key === "g" && drawerOpen) {
    const e2 = state.filtered[state.drawerIdx];
    if (e2 && e2.url) window.open(e2.url, "_blank", "noopener");
    return;
  }
  if (e.key === "1") { document.querySelector('[data-tab="all"]').click(); return; }
  if (e.key === "2") { document.querySelector('[data-tab="recent"]').click(); return; }
  if (e.key === "3") { document.querySelector('[data-tab="recent30"]').click(); return; }
  if (e.key === "4") { document.querySelector('[data-tab="recent365"]').click(); return; }
  if (e.key === "j" || e.key === "ArrowDown") {
    e.preventDefault();
    if (drawerOpen) drawerStep(1); else moveFocus(1);
    return;
  }
  if (e.key === "k" || e.key === "ArrowUp") {
    e.preventDefault();
    if (drawerOpen) drawerStep(-1); else moveFocus(-1);
    return;
  }
  if (e.key === "Enter" && !drawerOpen && state.focusIdx >= 0) {
    e.preventDefault();
    openDrawer(state.focusIdx);
    return;
  }
});

window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("search").value = state.filters.search || "";
  document.querySelectorAll("nav.tabs button").forEach(b => b.classList.toggle("active", b.dataset.tab === state.filters.tab));
});

load();
</script>
</body>
</html>
