function renderTopicsLanding() {
  const labels = t();
  const target = document.getElementById("topics-page");
  const vocab = state.topicsVocab || { stacks: [], topics: [] };
  const agg = state.topicsAggregate || {};
  const techVocab = state.data?.technologies_vocab?.technologies || [];

  // Build lookup from topic_id → topic record and technology_id → [topic_ids]
  const topicById = {};
  for (const t of vocab.topics || []) topicById[t.id] = t;

  // Group topics by technology using technologies_vocab.
  const byTech = {};  // tech_id → { tech, topics: [...] }
  const techById = {};
  let ungrouped = vocab.topics ? [...vocab.topics] : [];

  if (techVocab.length) {
    for (const tech of techVocab) {
      techById[tech.id] = tech;
      const topicIds = tech.topic_ids || [];
      const topics = [];
      for (const tid of topicIds) {
        const t = topicById[tid];
        if (t) { topics.push(t); ungrouped = ungrouped.filter(x => x.id !== tid); }
      }
      byTech[tech.id] = { tech, topics };
    }
  }
  // Fallback: ungrouped topics (legacy — no technology field or unknown tech)
  if (ungrouped.length) {
    techById["other"] = { id: "other", label_en: "Other", label_zh: "其他", color: "#71717a" };
    byTech["other"] = { tech: techById["other"], topics: ungrouped };
  }

  function mixLine(tid) {
    const a = agg[tid];
    if (!a) return "";
    const counts = { academia: 0, industry: 0, standards: 0 };
    const byType = a.by_type_primary || {};
    for (const [type, ids] of Object.entries(byType)) {
      const cat = ({
        "academic-paper": "academia", "tutorial": "academia",
        "ieee-document": "standards", "proposal": "standards",
        "product": "industry", "industry-news": "industry",
        "vendor-news": "industry", "news": "industry",
      })[type] || "industry";
      counts[cat] += ids.length;
    }
    const parts = [];
    if (counts.academia)  parts.push(`<span class="mix-pill" data-cat="academia">${labels.col_academia} ${counts.academia}</span>`);
    if (counts.industry)  parts.push(`<span class="mix-pill" data-cat="industry">${labels.col_industry} ${counts.industry}</span>`);
    if (counts.standards) parts.push(`<span class="mix-pill" data-cat="standards">${labels.col_standards} ${counts.standards}</span>`);
    return parts.join("");
  }

  function topicCard(t) {
    const a = agg[t.id] || { entries_primary: [], entries_secondary: [] };
    const nPri = a.entries_primary.length;
    const nSec = a.entries_secondary.length;
    const empty = nPri === 0 ? " empty" : "";
    const label = state.lang === "zh" ? (t.label_zh || t.label_en) : t.label_en;
    const desc  = state.lang === "zh" ? (t.description_zh || t.description_en) : t.description_en;
    const counts =
      `<span class="pri">${labels.topic_count_primary(nPri)}</span>` +
      (nSec ? `<span class="sec">${labels.topic_count_secondary(nSec)}</span>` : "");
    const mix = mixLine(t.id);
    return `<article class="topic-card${empty}" data-topic="${escAttr(t.id)}">
      <div class="topic-head">
        <div class="topic-label">${escHTML(label)}</div>
        <div class="topic-counts">${counts}</div>
      </div>
      <p class="topic-desc">${escHTML(desc || "")}</p>
      <div class="topic-mix">${mix || `<span class="mix-pill">${labels.topic_no_entries}</span>`}</div>
    </article>`;
  }

  // Build HTML: technology sections, each with stack sub-sections.
  let html = `<p class="intro" style="font-size:13px;color:var(--fg-2);max-width:900px;margin:6px 0 16px">${escHTML(labels.topics_intro)}</p>`;

  for (const tech of techVocab) {
    const entry = byTech[tech.id];
    if (!entry || !entry.topics.length) continue;
    const techLabel = state.lang === "zh" ? (tech.label_zh || tech.label_en) : tech.label_en;
    const totalPri = entry.topics.reduce((acc, t) => acc + ((agg[t.id]?.entries_primary || []).length), 0);
    html += `<section class="tech-section">
      <div class="tech-head" data-tech="${escAttr(tech.id)}">
        <span>${escHTML(techLabel)}</span>
        <span class="tech-count">${entry.topics.length} bins · ${totalPri} entries</span>
      </div>`;
    // Group topics within this technology by stack.
    const byStack = {};
    for (const t of entry.topics) {
      const s = t.stack || "other";
      (byStack[s] = byStack[s] || []).push(t);
    }
    for (const [stackId, topicsInStack] of Object.entries(byStack)) {
      const stackLabel = state.lang === "zh" ? (tech.stacks || []).find(s => s.id === stackId)?.label_zh || stackId : (tech.stacks || []).find(s => s.id === stackId)?.label_en || stackId;
      html += `<div class="stack-block">
        <div class="stack-head">
          <span>${escHTML(stackLabel)}</span>
          <span class="count">${topicsInStack.length} bins</span>
        </div>
        <div class="topic-grid">${topicsInStack.map(topicCard).join("")}</div>
      </div>`;
    }
    html += `</section>`;
  }

  target.innerHTML = html;
  // Wire topic-card clicks → topic-detail view.
  target.querySelectorAll(".topic-card").forEach(el => {
    el.addEventListener("click", () => {
      const tid = el.dataset.topic;
      state.filters.topicPrimary = tid;
      state.focusIdx = -1;
      render(); writeUrlState();
      // Scroll back to top of the column area so the user sees the breadcrumb.
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

function renderTopicBreadcrumb() {
  const labels = t();
  const bc = document.getElementById("topic-breadcrumb");
  const tid = state.filters.topicPrimary;
  if (!tid) { bc.hidden = true; bc.innerHTML = ""; return; }
  const topic = (state.topicsVocab.topics || []).find(t => t.id === tid);
  if (!topic) { bc.hidden = true; bc.innerHTML = ""; return; }
  const label = state.lang === "zh" ? (topic.label_zh || topic.label_en) : topic.label_en;
  const desc  = state.lang === "zh" ? (topic.description_zh || topic.description_en) : topic.description_en;
  // Pull the per-topic narrative (markdown converted to HTML by rebuild). The
  // narrative is the *living document* for this bin — see topics/<id>.md.
  const agg = state.topicsAggregate[tid] || {};
  const narrativeHtml =
    state.lang === "zh"
      ? (agg.narrative_html_zh || agg.narrative_html_en || "")
      : (agg.narrative_html_en || agg.narrative_html_zh || "");
  const narrativeUpdated = agg.narrative_last_updated || "";
  let narrativeBlock;
  if (narrativeHtml) {
    const meta = narrativeUpdated
      ? `<div class="narrative-meta">${state.lang === "zh" ? "现状摘要 · 更新于" : "Current state · updated"} ${escHTML(narrativeUpdated)}</div>`
      : "";
    narrativeBlock = `<div class="topic-narrative">${meta}${narrativeHtml}</div>`;
  } else {
    narrativeBlock =
      `<div class="topic-narrative empty">${
        state.lang === "zh"
          ? "本主题暂无现状摘要 — 巡检智能体会在条目积累后补写。"
          : "No narrative for this topic yet — the scout will write one when entries accumulate."
      }</div>`;
  }
  // Per-topic mindmap (mermaid). Rendered below the narrative.
  // Pick the right language variant; fall back to English when the Chinese
  // file is absent (e.g., new topics added before translation lands).
  const diagramSrcZh = (agg.diagram_mmd_zh || "").trim();
  const diagramSrcEn = (agg.diagram_mmd_en || agg.diagram_mmd || "").trim();
  const diagramSrc = state.lang === "zh"
    ? (diagramSrcZh || diagramSrcEn)
    : diagramSrcEn;
  let diagramBlock = "";
  if (diagramSrc) {
    const headerLabel = state.lang === "zh" ? "结构总览" : "Topic map";
    const toggleLabel = state.lang === "zh" ? "折叠" : "Hide";
    diagramBlock = `
      <div class="topic-diagram" id="topic-diagram">
        <div class="topic-diagram-header">
          <span>${escHTML(headerLabel)}</span>
          <button class="topic-diagram-toggle" id="topic-diagram-toggle">${escHTML(toggleLabel)}</button>
        </div>
        <div class="topic-diagram-body">
          <pre class="mermaid">${escHTML(diagramSrc)}</pre>
        </div>
      </div>`;
  }
  bc.hidden = false;
  bc.innerHTML = `
    <div class="crumb-row">
      <button class="back-btn" id="topic-back-btn">${escHTML(labels.topic_back)}</button>
      <span class="sep">›</span>
      <span class="topic-name">${escHTML(label)}</span>
    </div>
    <p class="topic-detail-desc">${escHTML(desc || "")}</p>
    ${narrativeBlock}
    ${diagramBlock}`;
  document.getElementById("topic-back-btn").addEventListener("click", () => {
    state.filters.topicPrimary = "";
    state.focusIdx = -1;
    render(); writeUrlState();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  if (diagramSrc) {
    const wrap = document.getElementById("topic-diagram");
    const toggleBtn = document.getElementById("topic-diagram-toggle");
    toggleBtn.addEventListener("click", () => {
      wrap.classList.toggle("collapsed");
      const collapsed = wrap.classList.contains("collapsed");
      toggleBtn.textContent = collapsed
        ? (state.lang === "zh" ? "展开" : "Show")
        : (state.lang === "zh" ? "折叠" : "Hide");
    });
    // Mermaid is loaded as an ES module (async), so the first render of a
    // topic page often happens before window.mermaid is set. Await the
    // Promise the module assigns to window.mermaidReady before calling run().
    // mermaid.run() is itself idempotent — running again on the same element
    // after later renders is harmless because mermaid checks the data attr.
    const ready = window.mermaidReady;
    if (ready && typeof ready.then === "function") {
      ready
        .then(m => m.run({ querySelector: "#topic-diagram .mermaid" }))
        .catch(() => { /* viewer still works without the diagram */ });
    }
  }
}

function renderTaxonomy() {
  const labels = t();
  const target = document.getElementById("taxonomy-page");
  const data = window.TAXONOMY_DATA;
  if (!data || !Array.isArray(data.categories)) {
    target.innerHTML = `<div class="empty-state">No <code>taxonomy.json</code> found. Run <code>python scripts/gen_taxonomy.py</code> to regenerate.</div>`;
    return;
  }

  let html = `<p class="intro">${escHTML(labels.taxonomy_intro)}</p>`;

  // Search box
  html += `<div class="taxonomy-search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="taxonomy-search" id="taxonomy-search" autocomplete="off" placeholder="${escAttr(labels.taxonomy_search)}" />
    <button class="search-clear" id="taxonomy-search-clear" hidden aria-label="Clear">x</button>
  </div>`;

  // Category nav pills
  const catLabels = data.categories.map(c => {
    const label = state.lang === "zh" ? c.label_zh : c.label_en;
    return `<a href="#tax-cat-${escAttr(c.id)}">${escHTML(label)}</a>`;
  }).join("");
  html += `<nav class="taxonomy-nav">${catLabels}</nav>`;

  // Each category and its terms
  for (const cat of data.categories) {
    const catLabel = state.lang === "zh" ? cat.label_zh : cat.label_en;
    const catDesc = state.lang === "zh" ? cat.description_zh : cat.description_en;
    html += `<section class="taxonomy-cat" id="tax-cat-${escAttr(cat.id)}">
      <div class="taxonomy-cat-head">
        <span>${escHTML(catLabel)}</span>
        <span class="count">${labels.taxonomy_count(cat.terms.length)}</span>
      </div>`;
    if (catDesc) {
      html += `<p class="taxonomy-cat-desc">${escHTML(catDesc)}</p>`;
    }
    for (const term of cat.terms) {
      const aliases = term.aliases && term.aliases.length
        ? term.aliases.map(a => escHTML(a)).join(" · ")
        : "";
      const defEN = term.definition_en || "";
      const defZH = term.definition_zh || "";
      // Show both language definitions, with the active language first
      const defPrimary = state.lang === "zh" ? defZH : defEN;
      const defSecondary = state.lang === "zh" ? defEN : defZH;
      const tagPrimary = state.lang === "zh" ? "ZH" : "EN";
      const tagSecondary = state.lang === "zh" ? "EN" : "ZH";
      html += `<div class="taxonomy-term" data-term="${escAttr(term.term)}" data-search="${escAttr(term.term + " " + (term.aliases || []).join(" ") + " " + defEN + " " + defZH)}">
        <div class="term-head">
          <span class="term-name">${escHTML(term.term)}</span>
          ${aliases ? `<span class="term-aliases">${aliases}</span>` : ""}
        </div>
        <div class="term-lang-tag">${tagPrimary}</div>
        <div class="term-def">${defPrimary}</div>`;
      if (defSecondary) {
        html += `<div class="term-lang-tag" style="margin-top:6px">${tagSecondary}</div>
        <div class="term-def">${defSecondary}</div>`;
      }
      html += `</div>`;
    }
    html += `</section>`;
  }

  target.innerHTML = html;

  // Wire search
  const searchInput = document.getElementById("taxonomy-search");
  const clearBtn = document.getElementById("taxonomy-search-clear");
  searchInput.addEventListener("input", () => {
    const q = searchInput.value.toLowerCase().trim();
    clearBtn.hidden = !q;
    let hasVisible = false;
    document.querySelectorAll(".taxonomy-term").forEach(el => {
      const hay = (el.dataset.search || "").toLowerCase();
      const match = !q || hay.includes(q);
      el.style.display = match ? "" : "none";
      if (match) hasVisible = true;
    });
    // Also hide/show categories
    document.querySelectorAll(".taxonomy-cat").forEach(cat => {
      const visible = cat.querySelectorAll(".taxonomy-term[style*=\"display: none\"]").length < cat.querySelectorAll(".taxonomy-term").length;
      cat.style.display = visible || !q ? "" : "none";
    });
    // Show no-results message
    let nr = document.getElementById("taxonomy-no-results");
    if (!hasVisible && q) {
      if (!nr) {
        nr = document.createElement("div");
        nr.id = "taxonomy-no-results";
        nr.className = "taxonomy-no-results";
        nr.textContent = labels.taxonomy_no_results;
        document.querySelector(".taxonomy-nav").after(nr);
      }
      nr.style.display = "";
    } else if (nr) {
      nr.style.display = "none";
    }
  });
  clearBtn.addEventListener("click", () => {
    searchInput.value = "";
    searchInput.dispatchEvent(new Event("input"));
    searchInput.focus();
  });
}

function render() {
  // The viewer has three top-level page modes:
  //   1. Sources tab        → sources page
  //   2. Topics tab + no topicPrimary → topic-landing grid
  //   3. Everything else    → 3-column entry view (filtered as appropriate)
  const isSources = state.filters.tab === "sources";
  const isTaxonomy = state.filters.tab === "taxonomy";
  const isTopicsLanding = state.filters.tab === "topics" && !state.filters.topicPrimary;
  const isTopicDetail   = state.filters.tab === "topics" && !!state.filters.topicPrimary;

  document.getElementById("columns").hidden = isSources || isTopicsLanding || isTaxonomy;
  document.getElementById("sources-page").hidden = !isSources;
  document.getElementById("topics-page").hidden = !isTopicsLanding;
  document.getElementById("taxonomy-page").hidden = !isTaxonomy;
  document.body.classList.toggle("tab-taxonomy", isTaxonomy);
  // The whole sidebar (search + facets) only makes sense for entry browsing
  // (topic-detail and All/Recent tabs). On Sources and Topics-landing, hide.
  const hideSidebar = isSources || isTopicsLanding || isTaxonomy;
  document.body.classList.toggle("tab-sources", isSources);
  document.body.classList.toggle("tab-topics-landing", isTopicsLanding);
  const sidebar = document.querySelector("aside.sidebar");
  if (sidebar) sidebar.style.display = hideSidebar ? "none" : "";
  document.getElementById("result-count").style.display = (isSources || isTopicsLanding || isTaxonomy) ? "none" : "";
  document.getElementById("mark-all-read").style.display = (isSources || isTopicsLanding || isTaxonomy) ? "none" : "";

  document.querySelectorAll("nav.tech-nav button").forEach(b => {
    b.classList.toggle("active", b.dataset.tech === state.filters.technology);
  });

  if (isSources)        { renderSources(); return; }
  if (isTaxonomy)       { renderTaxonomy(); return; }
  if (isTopicsLanding)  { renderTopicsLanding(); return; }
  renderTopicBreadcrumb();
  state.filtered = state.entries.filter(entryMatches);
  document.getElementById("result-count").textContent = t().of_n(state.filtered.length, state.entries.length);
  renderAppliedChips();
  document.getElementById("facet-clear").hidden = !(state.filters.topics.size || state.filters.search);

  // Group by category, then by month
  const byCat = { academia: [], industry: [], standards: [] };
  state.filtered.forEach((e, idx) => byCat[e.category]?.push({ e, idx }));
  for (const cat of CATEGORIES) {
    const target = document.getElementById("col-" + cat);
    document.getElementById("count-" + cat).textContent = byCat[cat].length;
    if (!byCat[cat].length) {
      target.innerHTML = `<div class="empty-col">${t().no_match_col}</div>`;
      continue;
    }
    const density = buildDensityHTML(byCat[cat], cat);
    let lastMonthKey = null;
    const cardsHtml = byCat[cat].map(({ e, idx }) => {
      const date = e.date_published || e.date_found;
      const [yy, mm] = date.split("-");
      const monthKey = yy + "-" + mm;
      let divider = "";
      if (monthKey !== lastMonthKey) {
        divider = `<div class="month-divider" data-month-key="${monthKey}">${t().month_label(parseInt(yy,10), parseInt(mm,10))}</div>`;
        lastMonthKey = monthKey;
      }
      return divider + cardHTML(e, idx);
    }).join("");
    target.innerHTML = density + cardsHtml;
  }
  bindCards();
  bindDensityBars();
  applyFocus();
}

function bindDensityBars() {
  document.querySelectorAll(".col-density .bar").forEach(bar => {
    bar.addEventListener("click", () => {
      const k = bar.dataset.monthKey;
      const cat = bar.dataset.cat;
      const target = document.querySelector(`#col-${cat} .month-divider[data-month-key="${k}"]`);
      if (target) target.scrollIntoView({ block: "start", behavior: "smooth" });
    });
  });
}

function renderAppliedChips() {
  const c = document.getElementById("applied-chips");
  const chips = [];
  if (state.filters.search) chips.push({ kind: "search", value: state.filters.search, label: `“${state.filters.search}”` });
  state.filters.topics.forEach(v => chips.push({ kind: "topic", value: v, label: v }));
  c.innerHTML = chips.map(ch =>
    `<span class="chip" data-kind="${ch.kind}" data-value="${escAttr(ch.value)}">${escHTML(ch.label)}</span>`
  ).join("");
  c.querySelectorAll(".chip").forEach(el => {
    el.addEventListener("click", () => {
      const { kind, value } = el.dataset;
      if (kind === "search") { state.filters.search = ""; document.getElementById("search").value = ""; }
      else if (kind === "topic") state.filters.topics.delete(value);
      render(); renderFacets(); writeUrlState();
    });
  });
}

function relativeDate(iso) {
  // Returns "3d ago" / "May 1" / "Apr 2025" depending on age.
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  const now = new Date();
  const ms = now - d;
  const day = 24 * 60 * 60 * 1000;
  const days = Math.floor(ms / day);
  if (days < 1)  return state.lang === "zh" ? "今天" : "today";
  if (days < 7)  return state.lang === "zh" ? `${days} 天前` : `${days}d ago`;
  if (days < 30) return state.lang === "zh" ? `${Math.floor(days/7)} 周前` : `${Math.floor(days/7)}w ago`;
  // Same calendar year → short month + day
  const monthsEn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const yyyy = d.getFullYear(), mm = d.getMonth() + 1, dd = d.getDate();
  if (yyyy === now.getFullYear()) {
    return state.lang === "zh" ? `${mm} 月 ${dd} 日` : `${monthsEn[mm-1]} ${dd}`;
  }
  return state.lang === "zh" ? `${yyyy} 年 ${mm} 月` : `${monthsEn[mm-1]} ${yyyy}`;
}

function carouselHTML(images) {
  if (!images || !images.length) return "";
  const slides = images.map((im, i) =>
    `<div class="carousel-slide"><img src="${escAttr(im.url)}" alt="" loading="lazy" onerror="this.closest('.carousel-slide').style.display='none'"></div>`
  ).join("");
  const dots = images.length > 1
    ? `<div class="carousel-dots" data-stop>${
        images.map((_, i) =>
          `<button class="dot${i === 0 ? " active" : ""}" data-go="${i}" data-stop aria-label="Image ${i+1}"></button>`
        ).join("")
      }</div>`
    : "";
  const buttons = images.length > 1
    ? `<button class="carousel-btn prev" data-step="-1" data-stop aria-label="Previous image">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
       </button>
       <button class="carousel-btn next" data-step="1" data-stop aria-label="Next image">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
       </button>`
    : "";
  return `<div class="carousel" data-count="${images.length}" data-pos="0">
    <div class="carousel-track">${slides}</div>
    ${buttons}${dots}
  </div>`;
}

function cardHTML(e, idx) {
  const title = pickLang(e, "title");
  const summary = pickLang(e, "summary_short");
  const novelty = e.novelty_score || 0;
  const noveltyHTML = `<span class="novelty"><span class="novelty-bar">${[1,2,3,4,5].map(n => `<i${n<=novelty?' class="on"':''}></i>`).join("")}</span></span>`;
  const topicsHTML = (e.topics || []).slice(0, 5).map(tg => {
    const active = state.filters.topics.has(tg) ? " active" : "";
    return `<span class="pill topic${active}" data-topic="${escAttr(tg)}">${escHTML(tg)}</span>`;
  }).join("");
  const overflow = (e.topics || []).length > 5 ? `<span class="pill" title="${escAttr((e.topics || []).slice(5).join(", "))}">+${(e.topics || []).length - 5}</span>` : "";
  const date = e.date_published || e.date_found;
  const dateLabel = relativeDate(date);
  const dateTitle = ` title="${escAttr(date)}"`;
  const isRead = state.readSet.has(e.id);
  const cls = isRead ? "read" : "unread";
  const cat = e.category || "industry";
  const tech = e.technology || "wifi";
  return `<article class="entry-card ${cls}" data-idx="${idx}" data-cat="${escAttr(cat)}" data-tech="${escAttr(tech)}">
    <div class="stripe"></div>
    <div class="content">
      ${carouselHTML(e.images)}
      <div class="text">
        <div class="top-row">
          <span class="tech-dot" title="${escAttr(tech)}" aria-hidden="true"></span>
          <span class="pub-date"${dateTitle}>${dateLabel}</span>
          <span class="type-label">${escHTML(e.type || "")}</span>
        </div>
        <div class="title">${escHTML(title)}</div>
        ${summary ? `<div class="summary">${escHTML(summary)}</div>` : ""}
        <div class="meta">
          ${noveltyHTML}
          ${topicsHTML}${overflow}
        </div>
      </div>
    </div>
  </article>`;
}

function carouselGoto(carousel, pos) {
  const total = parseInt(carousel.dataset.count, 10) || 1;
  const next = ((pos % total) + total) % total;
  carousel.dataset.pos = String(next);
  const track = carousel.querySelector(".carousel-track");
  if (track) track.style.transform = `translateX(-${next * 100}%)`;
  carousel.querySelectorAll(".carousel-dots .dot").forEach((d, i) => {
    d.classList.toggle("active", i === next);
  });
}

function bindCards() {
  document.querySelectorAll(".entry-card").forEach(card => {
    card.addEventListener("click", e => {
      // Carousel arrow / dot clicks: don't open the drawer
      const stopEl = e.target.closest("[data-stop]");
      if (stopEl) {
        const carousel = stopEl.closest(".carousel");
        if (!carousel) return;
        e.stopPropagation();
        if (stopEl.dataset.step) {
          const step = parseInt(stopEl.dataset.step, 10);
          const cur = parseInt(carousel.dataset.pos || "0", 10);
          carouselGoto(carousel, cur + step);
        } else if (stopEl.dataset.go) {
          carouselGoto(carousel, parseInt(stopEl.dataset.go, 10));
        }
        return;
      }
      const topicEl = e.target.closest("[data-topic]");
      if (topicEl) {
        const tg = topicEl.dataset.topic;
        if (state.filters.topics.has(tg)) state.filters.topics.delete(tg);
        else state.filters.topics.add(tg);
        render(); renderFacets(); writeUrlState();
        return;
      }
      openDrawer(parseInt(card.dataset.idx, 10));
    });
  });
}

function openDrawer(idx) {
  if (idx < 0 || idx >= state.filtered.length) return;
  state.drawerIdx = idx; state.focusIdx = idx;
  const e = state.filtered[idx];
  if (e && !state.readSet.has(e.id)) {
    markRead(e.id);
    // Update the open card's class without a full re-render so the position is preserved.
    const card = document.querySelector(`.entry-card[data-idx="${idx}"]`);
    if (card) { card.classList.remove("unread"); card.classList.add("read"); }
  }
  renderDrawer();
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawer-overlay").classList.add("open");
  document.getElementById("drawer").setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
  writeUrlState();
  applyFocus();
}
function closeDrawer() {
  state.drawerIdx = -1;
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawer-overlay").classList.remove("open");
  document.getElementById("drawer").setAttribute("aria-hidden", "true");
  document.body.style.overflow = "";
  writeUrlState();
}
function drawerStep(delta) {
  if (state.drawerIdx < 0) return;
  const next = state.drawerIdx + delta;
  if (next < 0 || next >= state.filtered.length) return;
  state.drawerIdx = next; state.focusIdx = next;
  const e = state.filtered[next];
  if (e && !state.readSet.has(e.id)) {
    markRead(e.id);
    const card = document.querySelector(`.entry-card[data-idx="${next}"]`);
    if (card) { card.classList.remove("unread"); card.classList.add("read"); }
  }
  renderDrawer();
  document.getElementById("drawer-body").scrollTop = 0;
  writeUrlState(); applyFocus();
}
function renderDrawer() {
  const e = state.filtered[state.drawerIdx];
  if (!e) return;
  const title = pickLang(e, "title");
  const bodyHTML = e["body_html_" + state.lang] || e["body_html_" + (state.lang === "en" ? "zh" : "en")] || "";
  const novelty = e.novelty_score || 0;
  const noveltyBar = `<span class="novelty"><span class="novelty-bar">${[1,2,3,4,5].map(n=>`<i${n<=novelty?' class="on"':''}></i>`).join("")}</span><span style="margin-left:6px">${t().novelty} ${novelty}/5</span></span>`;
  const topics = (e.topics || []).map(tg => `<span class="pill topic">${escHTML(tg)}</span>`).join("");
  const captionKey = state.lang === "zh" ? "caption_zh" : "caption_en";
  const imagesHTML = !(e.images && e.images.length) ? "" :
    `<div class="images-block">${e.images.map(im =>
      `<figure>
        <a href="${escAttr(im.url)}" target="_blank" rel="noopener"><img src="${escAttr(im.url)}" alt="${escAttr(im[captionKey] || "")}" loading="lazy"></a>
        ${im[captionKey] ? `<figcaption>${escHTML(im[captionKey])}</figcaption>` : ""}
      </figure>`).join("")}</div>`;
  const date = e.date_published || e.date_found;
  document.getElementById("drawer-body").innerHTML = `
    <h2 class="entry-title">${escHTML(title)}</h2>
    <div class="meta-row">
      <span class="date">${date}</span>
      <span class="pill type">${escHTML(e.type || "")}</span>
      ${noveltyBar}
      ${topics}
    </div>
    <div class="body-html">${bodyHTML}</div>
    ${imagesHTML}`;
  document.getElementById("drawer-pos").textContent = t().pos(state.drawerIdx, state.filtered.length);
  const orig = document.getElementById("drawer-original");
  orig.href = e.url || "#";
  orig.style.display = e.url ? "" : "none";
  const src = document.getElementById("drawer-source");
  src.href = "https://github.com/ntutangyun/wireless_comm_knowledge_base/blob/main/" + (e.entry_path || "");
}

function applyFocus() {
  document.querySelectorAll(".entry-card").forEach(c => {
    const idx = parseInt(c.dataset.idx, 10);
    c.classList.toggle("focused", idx === state.focusIdx);
  });
  if (state.focusIdx >= 0) {
    const el = document.querySelector(`.entry-card[data-idx="${state.focusIdx}"]`);
    if (el) el.scrollIntoView({ block: "nearest", behavior: "smooth" });
  }
}
function moveFocus(delta) {
  const n = state.filtered.length;
  if (!n) return;
  if (state.focusIdx < 0) state.focusIdx = 0;
  else state.focusIdx = Math.max(0, Math.min(n-1, state.focusIdx + delta));
  applyFocus();
}

function escHTML(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escAttr(s) { return escHTML(s); }

function copyCitation() {
  const e = state.filtered[state.drawerIdx];
  if (!e) return;
  const title = pickLang(e, "title");
  const date = e.date_published || e.date_found;
  const txt = `${title}. ${date}. ${e.url || ""}`;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById("drawer-copy");
    const orig = btn.textContent;
    btn.textContent = t().copied;
    setTimeout(() => { btn.textContent = orig; }, 1500);
  });
}

document.querySelectorAll("nav.tabs button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("nav.tabs button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const newTab = btn.dataset.tab;
    if (newTab !== "topics") state.filters.topicPrimary = "";
    else if (state.filters.tab !== "topics") state.filters.topicPrimary = "";
    state.filters.tab = newTab;
    state.focusIdx = -1;
    document.body.classList.toggle("tab-taxonomy", newTab === "taxonomy");
    render(); writeUrlState();
  });
});
document.querySelectorAll("nav.tech-nav button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("nav.tech-nav button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.filters.technology = btn.dataset.tech;
    state.focusIdx = -1;
    render(); writeUrlState();
  });
});
document.getElementById("search").addEventListener("input", e => {
  state.filters.search = e.target.value;
  state.focusIdx = -1;
  render(); writeUrlState();
});
document.querySelectorAll("#lang-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    state.lang = btn.dataset.lang;
    localStorage.setItem("kb_lang", state.lang);
    applyLang();
    if (state.entries.length) {
      document.getElementById("stats").textContent =
        `${state.entries.length} ${t().entries_label} · ${t().last_updated} ${state.data.last_updated || "—"}`;
      render();
      if (state.drawerIdx >= 0) renderDrawer();
    }
    writeUrlState();
  });
});
document.getElementById("theme-btn").addEventListener("click", () => {
  state.theme = state.theme === "dark" ? "light" : "dark";
  localStorage.setItem("kb_theme", state.theme);
  applyTheme();
});
document.getElementById("filters-btn").addEventListener("click", () => {
  const on = document.body.classList.toggle("show-filters");
  document.getElementById("filters-btn").classList.toggle("is-active", on);
  document.getElementById("filters-btn").setAttribute("aria-pressed", on ? "true" : "false");
});
document.getElementById("drawer-close").addEventListener("click", closeDrawer);
document.getElementById("drawer-overlay").addEventListener("click", closeDrawer);
document.getElementById("drawer-prev").addEventListener("click", () => drawerStep(-1));
document.getElementById("drawer-next").addEventListener("click", () => drawerStep(1));
document.getElementById("drawer-copy").addEventListener("click", copyCitation);
document.getElementById("facet-clear").addEventListener("click", () => {
  state.filters.topics.clear(); state.filters.search = "";
  document.getElementById("search").value = "";
  render(); renderFacets(); writeUrlState();
});
document.getElementById("mark-all-read").addEventListener("click", (ev) => {
  // Click = mark all read; Shift+Click = clear all read state
  if (ev.shiftKey) clearRead(); else markAllRead();
});
document.getElementById("help-btn").addEventListener("click", () => document.getElementById("help-modal").classList.add("open"));
document.getElementById("help-close").addEventListener("click", () => document.getElementById("help-modal").classList.remove("open"));
document.getElementById("help-modal").addEventListener("click", e => { if (e.target.id === "help-modal") e.currentTarget.classList.remove("open"); });

window.addEventListener("keydown", e => {
  const inField = e.target.matches("input, textarea, [contenteditable]");
  const drawerOpen = state.drawerIdx >= 0;
  if (e.key === "Escape") {
    if (document.getElementById("help-modal").classList.contains("open")) { document.getElementById("help-modal").classList.remove("open"); return; }
    if (drawerOpen) { closeDrawer(); return; }
    if (inField) { e.target.blur(); return; }
  }
  if (inField) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === "/") { e.preventDefault(); document.getElementById("search").focus(); return; }
  if (e.key === "?") { document.getElementById("help-modal").classList.add("open"); return; }
  if (e.key === "t") { document.getElementById("theme-btn").click(); return; }
  if (e.key === "l") {
    const next = state.lang === "en" ? "zh" : "en";
    document.querySelector(`#lang-toggle button[data-lang="${next}"]`).click();
    return;
  }
  if (e.key === "g" && drawerOpen) {
    const e2 = state.filtered[state.drawerIdx];
    if (e2 && e2.url) window.open(e2.url, "_blank", "noopener");
    return;
  }
  if (e.key === "1") { document.querySelector('[data-tab="topics"]').click(); return; }
  if (e.key === "2") { document.querySelector('[data-tab="all"]').click(); return; }
  if (e.key === "3") { document.querySelector('[data-tab="recent"]').click(); return; }
  if (e.key === "4") { document.querySelector('[data-tab="recent30"]').click(); return; }
  if (e.key === "5") { document.querySelector('[data-tab="recent365"]').click(); return; }
  if (e.key === "6") { document.querySelector('[data-tab="taxonomy"]').click(); return; }
  if (e.key === "j" || e.key === "ArrowDown") {
    e.preventDefault();
    if (drawerOpen) drawerStep(1); else moveFocus(1);
    return;
  }
  if (e.key === "k" || e.key === "ArrowUp") {
    e.preventDefault();
    if (drawerOpen) drawerStep(-1); else moveFocus(-1);
    return;
  }
  if (e.key === "Enter" && !drawerOpen && state.focusIdx >= 0) {
    e.preventDefault();
    openDrawer(state.focusIdx);
    return;
  }
});

window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("search").value = state.filters.search || "";
  document.querySelectorAll("nav.tabs button").forEach(b => b.classList.toggle("active", b.dataset.tab === state.filters.tab));
});

load();
</script>
</body>
