<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wi-Fi Knowledge Base</title>
<style>
  :root {
    --fg: #1a1a1a;
    --muted: #6b6b6b;
    --bg: #ffffff;
    --border: #e0e0e0;
    --accent: #b40000;
    --accent-bg: #fdf3f3;
    --tag-bg: #f1f1f1;
    --hit-bg: #fffaf0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
    color: var(--fg); background: var(--bg);
    font-size: 14px; line-height: 1.5;
  }
  body.lang-zh { font-family: "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  header {
    border-bottom: 2px solid var(--accent);
    padding: 14px 24px;
    display: flex; align-items: baseline; gap: 16px;
  }
  header h1 {
    margin: 0; font-size: 18px; color: var(--accent); font-weight: 700;
  }
  header .stats { color: var(--muted); font-size: 12px; }
  header .header-right { margin-left: auto; display: flex; gap: 14px; align-items: baseline; font-size: 12px; }
  header .repo-link a { color: var(--muted); text-decoration: none; }
  header .repo-link a:hover { color: var(--accent); text-decoration: underline; }
  .lang-toggle {
    display: inline-flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
  }
  .lang-toggle button {
    background: none; border: none; padding: 4px 10px; font: inherit;
    color: var(--muted); cursor: pointer; font-size: 12px;
  }
  .lang-toggle button.active { background: var(--accent); color: var(--bg); }
  nav.tabs {
    display: flex; gap: 0; padding: 0 24px; border-bottom: 1px solid var(--border);
  }
  nav.tabs button {
    background: none; border: none; padding: 10px 16px;
    font: inherit; color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  nav.tabs button.active {
    color: var(--accent); border-bottom-color: var(--accent); font-weight: 600;
  }
  main {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 24px;
    padding: 16px 24px;
    max-width: 1400px; margin: 0 auto;
  }
  aside.facets { font-size: 13px; }
  aside.facets h3 {
    margin: 14px 0 6px; font-size: 11px; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--muted);
  }
  aside.facets label {
    display: flex; align-items: center; gap: 6px;
    padding: 2px 0; cursor: pointer;
  }
  aside.facets label input { margin: 0; }
  aside.facets label .count { color: var(--muted); margin-left: auto; }
  .search {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    font: inherit;
  }
  .results { min-width: 0; }
  .result-count { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
  .entry {
    border: 1px solid var(--border); border-radius: 4px;
    padding: 12px 14px; margin-bottom: 10px;
    transition: border-color 0.1s;
  }
  .entry:hover { border-color: var(--accent); }
  .entry .row1 {
    display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap;
  }
  .entry .title { font-weight: 600; flex: 1; min-width: 0; }
  .entry .title a { color: var(--fg); text-decoration: none; }
  .entry .title a:hover { color: var(--accent); }
  .entry .date { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .entry .meta {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin: 6px 0;
  }
  .pill {
    display: inline-block; padding: 1px 8px; border-radius: 10px;
    font-size: 11px; background: var(--tag-bg); color: var(--fg);
  }
  .pill.novelty { background: var(--hit-bg); color: var(--accent); }
  .entry .summary { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .entry .links { margin-top: 6px; font-size: 12px; }
  .entry .links a { color: var(--accent); text-decoration: none; margin-right: 12px; }
  .entry .links a:hover { text-decoration: underline; }
  .entry .images {
    display: flex; gap: 8px; overflow-x: auto;
    margin-top: 8px; padding-bottom: 4px;
  }
  .entry .images figure {
    margin: 0; flex: 0 0 auto; max-width: 220px;
  }
  .entry .images img {
    max-width: 220px; max-height: 140px;
    border: 1px solid var(--border); border-radius: 3px;
    background: #fafafa;
    display: block;
  }
  .entry .images figcaption {
    font-size: 11px; color: var(--muted); margin-top: 3px;
    line-height: 1.3;
  }
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 13px;
  }
  .empty code { background: var(--tag-bg); padding: 2px 6px; border-radius: 3px; }
  @media (max-width: 720px) {
    main { grid-template-columns: 1fr; }
    aside.facets { border-bottom: 1px solid var(--border); padding-bottom: 12px; }
  }
</style>
</head>
<body>

<!-- kb.js defines window.KB_DATA. Loaded first so the file:// case works
     without a local web server (browsers block fetch() under file://). -->
<script src="kb.js" onerror="window.__KB_JS_FAILED=true"></script>

<header>
  <h1 id="header-title">Wi-Fi Knowledge Base</h1>
  <div class="stats" id="stats">Loading…</div>
  <div class="header-right">
    <div class="lang-toggle" id="lang-toggle">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="zh">中文</button>
    </div>
    <div class="repo-link"><a href="https://github.com/ntutangyun/wifi_knowledge_base" target="_blank" rel="noopener">GitHub ↗</a></div>
  </div>
</header>

<nav class="tabs" id="tabs">
  <button data-tab="all" class="active"></button>
  <button data-tab="recent"></button>
  <button data-tab="recent30"></button>
</nav>

<main>
  <aside class="facets">
    <input class="search" id="search" />

    <h3 id="facet-type-h">Type</h3>
    <div id="facet-type"></div>

    <h3 id="facet-topic-h">Topic</h3>
    <div id="facet-topic"></div>
  </aside>

  <section class="results">
    <div class="result-count" id="result-count"></div>
    <div id="entries"></div>
  </section>
</main>

<script>
const I18N = {
  en: {
    title: "Wi-Fi Knowledge Base",
    search_placeholder: "Search title, summary, topics…",
    facet_type: "Type",
    facet_topic: "Topic",
    tab_all: "All entries",
    tab_recent: "Last 7 days",
    tab_recent30: "Last 30 days",
    result_count: (n, total) => n + " of " + total,
    no_match: "No entries match the current filters.",
    last_updated: "last updated",
    entries_label: "entries",
    link_original: "↗ original",
    link_entry: "📄 entry",
    load_error: (msg) => 'No <code>kb.json</code> yet, or <code>kb.js</code> failed to load (' + msg + '). Run <code>python scripts/rebuild_index.py</code> to regenerate.',
  },
  zh: {
    title: "Wi-Fi 知识库",
    search_placeholder: "搜索标题、摘要、标签…",
    facet_type: "类型",
    facet_topic: "主题",
    tab_all: "全部条目",
    tab_recent: "最近 7 天",
    tab_recent30: "最近 30 天",
    result_count: (n, total) => "共 " + total + " 条 · 命中 " + n,
    no_match: "当前筛选条件下没有条目。",
    last_updated: "最后更新",
    entries_label: "条目",
    link_original: "↗ 原文链接",
    link_entry: "📄 条目文件",
    load_error: (msg) => '尚无 <code>kb.json</code>，或 <code>kb.js</code> 加载失败（' + msg + '）。请运行 <code>python scripts/rebuild_index.py</code> 重建。',
  },
};

let state = {
  entries: [],
  topicCounts: {},
  typeCounts: {},
  filters: {
    tab: "all",
    search: "",
    types: new Set(),
    topics: new Set(),
  },
  lang: localStorage.getItem("kb_lang") || "en",
};

function t() { return I18N[state.lang]; }

function applyLang() {
  document.documentElement.lang = state.lang === "zh" ? "zh" : "en";
  document.body.classList.toggle("lang-zh", state.lang === "zh");
  const labels = t();
  document.title = labels.title;
  document.getElementById("header-title").textContent = labels.title;
  document.getElementById("search").placeholder = labels.search_placeholder;
  document.getElementById("facet-type-h").textContent = labels.facet_type;
  document.getElementById("facet-topic-h").textContent = labels.facet_topic;
  const tabBtns = document.querySelectorAll("nav.tabs button");
  tabBtns[0].textContent = labels.tab_all;
  tabBtns[1].textContent = labels.tab_recent;
  tabBtns[2].textContent = labels.tab_recent30;
  document.querySelectorAll("#lang-toggle button").forEach(b => {
    b.classList.toggle("active", b.dataset.lang === state.lang);
  });
}

async function load() {
  applyLang();
  try {
    let data;
    if (window.KB_DATA && Array.isArray(window.KB_DATA.entries)) {
      data = window.KB_DATA;
    } else {
      const r = await fetch("kb.json", { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      data = await r.json();
    }
    state.entries = data.entries || [];
    state.topicCounts = data.topic_counts || {};
    state.typeCounts = data.type_counts || {};

    document.getElementById("stats").textContent =
      state.entries.length + " " + t().entries_label + " · " +
      t().last_updated + " " + (data.last_updated || "—");

    renderFacets();
    render();
  } catch (err) {
    document.getElementById("stats").textContent = "—";
    document.getElementById("entries").innerHTML =
      '<div class="empty">' + t().load_error(err.message) + '</div>';
  }
}

function renderFacets() {
  const mkChecks = (counts, key) => Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .map(([name, n]) => {
      const id = key + "-" + name.replace(/[^a-z0-9]/gi, "_");
      const checked = state.filters[key === "type" ? "types" : "topics"].has(name);
      return '<label><input type="checkbox" data-facet="' + key + '" data-value="' + name + '" id="' + id + '"' +
             (checked ? " checked" : "") + '>' +
             '<span>' + name + '</span><span class="count">' + n + '</span></label>';
    }).join("");

  document.getElementById("facet-type").innerHTML = mkChecks(state.typeCounts, "type");
  document.getElementById("facet-topic").innerHTML = mkChecks(state.topicCounts, "topic");

  document.querySelectorAll('[data-facet]').forEach(el => {
    el.addEventListener("change", e => {
      const facet = e.target.dataset.facet;
      const value = e.target.dataset.value;
      const setKey = facet === "type" ? "types" : "topics";
      const set = state.filters[setKey];
      if (e.target.checked) set.add(value); else set.delete(value);
      render();
    });
  });
}

function entryMatches(e) {
  const f = state.filters;

  if (f.tab === "recent") {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 7);
    if (new Date(e.date_found) < cutoff) return false;
  }
  if (f.tab === "recent30") {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 30);
    if (new Date(e.date_found) < cutoff) return false;
  }

  if (f.types.size && !f.types.has(e.type)) return false;
  if (f.topics.size && !(e.topics || []).some(tg => f.topics.has(tg))) return false;

  if (f.search) {
    const q = f.search.toLowerCase();
    const hay = (e.search_blob ||
                 [e.title_en, e.title_zh, (e.topics || []).join(" "),
                  e.summary_short_en, e.summary_short_zh].join(" ")).toLowerCase();
    if (!hay.includes(q)) return false;
  }

  return true;
}

function pickLang(e, field) {
  // Prefer the active language; fall back to the other if missing.
  const primary = e[field + "_" + state.lang];
  if (primary) return primary;
  const fallback = e[field + "_" + (state.lang === "en" ? "zh" : "en")];
  return fallback || "";
}

function imagesHTML(images) {
  if (!images || !images.length) return "";
  const captionKey = state.lang === "zh" ? "caption_zh" : "caption_en";
  const figs = images.map(img => {
    const cap = img[captionKey] || img.caption_en || img.caption_zh || "";
    return '<figure>' +
             '<a href="' + escapeAttr(img.url) + '" target="_blank" rel="noopener">' +
               '<img src="' + escapeAttr(img.url) + '" alt="' + escapeAttr(cap) + '" loading="lazy">' +
             '</a>' +
             (cap ? '<figcaption>' + escapeHTML(cap) + '</figcaption>' : '') +
           '</figure>';
  }).join("");
  return '<div class="images">' + figs + '</div>';
}

function entryHTML(e) {
  const novelty = (e.novelty_score != null) ? '<span class="pill novelty">novelty ' + e.novelty_score + '</span>' : '';
  const topicPills = (e.topics || []).map(tg => '<span class="pill topic">' + tg + '</span>').join("");
  const entryRel = e.entry_path || "";
  const title = pickLang(e, "title");
  const summary = pickLang(e, "summary_short");
  const labels = t();
  return '' +
    '<div class="entry">' +
      '<div class="row1">' +
        '<div class="title"><a href="' + (e.url || "#") + '" target="_blank" rel="noopener">' + escapeHTML(title) + '</a></div>' +
        '<div class="date">' + (e.date_found || "") + '</div>' +
      '</div>' +
      '<div class="meta">' +
        '<span class="pill type">' + (e.type || "") + '</span>' +
        topicPills +
        novelty +
      '</div>' +
      '<div class="summary">' + escapeHTML(summary) + '</div>' +
      imagesHTML(e.images) +
      '<div class="links">' +
        (e.url ? '<a href="' + e.url + '" target="_blank" rel="noopener">' + labels.link_original + '</a>' : '') +
        '<a href="' + entryRel + '" target="_blank">' + labels.link_entry + '</a>' +
      '</div>' +
    '</div>';
}

function escapeHTML(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function escapeAttr(s) { return escapeHTML(s); }

function render() {
  const matches = state.entries.filter(entryMatches);
  document.getElementById("result-count").textContent = t().result_count(matches.length, state.entries.length);
  if (!matches.length) {
    document.getElementById("entries").innerHTML =
      '<div class="empty">' + t().no_match + '</div>';
  } else {
    document.getElementById("entries").innerHTML = matches.map(entryHTML).join("");
  }
}

document.querySelectorAll("nav.tabs button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("nav.tabs button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.filters.tab = btn.dataset.tab;
    render();
  });
});

document.getElementById("search").addEventListener("input", e => {
  state.filters.search = e.target.value;
  render();
});

document.querySelectorAll("#lang-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    state.lang = btn.dataset.lang;
    localStorage.setItem("kb_lang", state.lang);
    applyLang();
    // Re-render: stats line + entries pick up the new language.
    if (state.entries.length) {
      const data = window.KB_DATA || {};
      document.getElementById("stats").textContent =
        state.entries.length + " " + t().entries_label + " · " +
        t().last_updated + " " + (data.last_updated || "—");
      render();
    }
  });
});

load();
</script>
</body>
</html>
